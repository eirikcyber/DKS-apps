<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKS Transport</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #f4f2ed;
    --surface: #ffffff;
    --border: #d4cfc6;
    --text: #1a1916;
    --dim: #7a756c;
    --accent: #2a5caa;
    --ok: #1a7a4a;
    --warn: #c47d00;
    --err: #b83232;
    --ok-bg: #eaf5ef;
    --warn-bg: #fdf4e3;
    --err-bg: #fdeaea;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--text);
    color: #f4f2ed;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  header span {
    font-size: 12px;
    opacity: 0.5;
    font-family: var(--mono);
  }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* Upload */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media(max-width: 700px){ .upload-grid { grid-template-columns: 1fr; } }

  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: #f0f4fb; }
  .drop-zone.loaded { border-color: var(--ok); border-style: solid; background: var(--ok-bg); }
  .drop-zone input { display: none; }
  .drop-zone .label { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .drop-zone .hint { font-size: 11px; color: var(--dim); font-family: var(--mono); }
  .drop-zone .fname { font-size: 11px; font-family: var(--mono); color: var(--ok); margin-top: 6px; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 9px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  #btnRun { background: var(--accent); color: #fff; }
  #btnRun:not(:disabled):hover { opacity: 0.85; }
  #btnReset { background: var(--border); color: var(--text); }
  #btnReset:hover { background: #c4bfb6; }

  /* Status */
  #status {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    display: none;
  }
  #status.visible { display: block; }

  /* Log */
  #logBox {
    font-family: var(--mono);
    font-size: 11px;
    background: #1a1916;
    color: #c8c4bc;
    border-radius: 6px;
    padding: 12px 14px;
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 20px;
    display: none;
  }
  #logBox.visible { display: block; }
  #logBox .ok { color: #6fc28a; }
  #logBox .err { color: #e07070; }
  #logBox .info { color: #7aabda; }
  #logBox .warn { color: #e0b870; }

  /* Tabs */
  #results { display: none; }
  #results.visible { display: block; }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .tab {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    color: var(--dim);
    letter-spacing: 0.04em;
    transition: color 0.1s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-align: left;
    padding: 8px 10px;
    background: var(--text);
    color: #f4f2ed;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: #f8f6f2; }
  tr.tur td { }
  tr.retur td { color: var(--dim); font-size: 12px; }
  tr.avvik td:first-child { border-left: 3px solid var(--warn); }
  tr.mangler td { background: var(--err-bg) !important; }
  tr.mangler td:first-child { border-left: 3px solid var(--err); }
  tr.group-start td { border-top: 2px solid var(--border); }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .badge-buss { background: #dde8f8; color: #2a5caa; }
  .badge-gange { background: #e8e8f0; color: #555580; }
  .badge-rufus { background: #fde8cc; color: #a05000; }
  .badge-tur { background: #e8f0e8; color: #2a5a2a; }
  .badge-retur { background: #f0e8f8; color: #5a2a7a; }
  .badge-avvik { background: var(--warn-bg); color: var(--warn); }
  .badge-mangler { background: var(--err-bg); color: var(--err); }

  .summary {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    min-width: 120px;
  }
  .stat .n { font-family: var(--mono); font-size: 22px; font-weight: 600; }
  .stat .l { font-size: 11px; color: var(--dim); font-family: var(--mono); margin-top: 2px; }

  .empty { color: var(--dim); font-family: var(--mono); font-size: 12px; padding: 20px; text-align: center; }
  .sort-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .sort-row label { font-size: 11px; font-family: var(--mono); color: var(--dim); }
  .sort-btn { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); cursor: pointer; }
  .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  tr.gange td { background: #f0f0f8 !important; color: var(--dim); }
  tr.gange td:first-child { border-left: 3px solid #9999cc; }
  .csv-row { margin-bottom: 10px; }
  .csv-btn { background: var(--surface); border: 1px solid var(--border); color: var(--dim); font-size: 11px; padding: 5px 14px; border-radius: 3px; }
  .csv-btn:hover { background: var(--bg); color: var(--text); border-color: var(--text); }
  .csv-btn.copied { color: var(--ok); border-color: var(--ok); }
</style>
</head>
<body>

<header>
  <h1>DKS // TRANSPORT</h1>

</header>

<div class="main">

  <div class="upload-grid">
    <div class="drop-zone" id="dropBest">

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
let bestFile = null, bekrFile = null;
let pyodide = null;
let pyReady = false;

// ============================================================
// SKULELISTE (Asker)
// ============================================================
const SKULAR = [
  'Arnestad skole','Billingstad skole','Blakstad skole','Bondi skole',
  'Drengsrud skole','Folkestad skole','Frydenlund barneskole',
  'Hagaløkka skole','Heggedal skole','Hofstad skole','Hyggen skole',
  'Hvalstad skole','Jansløkka skole','Mellom-Nes skole','Midtbygda barneskole',
  'Nærsnes barneskole','Nesøya skole','Rønningen skole','Slemmestad barneskole',
  'Solberg skole','Spikkestad barneskole','Steinerskolen i Asker',
  'Steinerskolen i Hurum','Sætre skole','Sydskogen barneskole',
  'Tofte skole','Torvbråten barneskole','Vardåsen skole','Vettre skole',
  'Arnestad skole','Asker ungdomsskole','Bleiker videregående skole',
  'Hagaløkka skole','Risenga ungdomsskole','Røyken videregående skole',
  'International School of Asker','Montessori Asker','Oslo Internasjonale Skole',
  'Vollen Montessoriskole',
];

function skolKjerne(s) {
  return s.replace(/\b(barneskole|ungdomsskole|videregående|skole|school)\b/g, '')
    .replace(/\s+/g, ' ').trim();
}

function normWords(s) {
  return s.replace(/\b(of|i|og|the)\b/g, '')
    .replace(/\s+/g, ' ').trim()
    .split(/\s+/).sort().join(' ');
}

function normSkule(s) {
  s = s.trim().replace(/:$/, '');
  const sl = s.toLowerCase();

  // Steg 1: eksakt match (case-insensitive)
  for (const off of SKULAR) {
    if (sl === off.toLowerCase()) return off;
  }

  // Steg 2: substring i begge retningar
  for (const off of SKULAR) {
    const ol = off.toLowerCase();
    if (sl.includes(ol) || ol.includes(sl)) return off;
  }

  // Steg 2b: kjerne-match – ignorer skuletypeord som "barneskole"/"skole"
  const slKjerne = skolKjerne(sl);
  if (slKjerne.length > 2) {
    for (const off of SKULAR) {
      const ofKjerne = skolKjerne(off.toLowerCase());
      if (ofKjerne.length > 2 && slKjerne === ofKjerne) return off;
    }
  }

  // Steg 2c: ordrekkjefølge-uavhengig match (t.d. "Asker international School")
  const slWords = normWords(sl);
  if (slWords.length > 2) {
    for (const off of SKULAR) {
      if (normWords(off.toLowerCase()) === slWords) return off;
    }
  }

  // Steg 3: fuzzy med høg terskel (0.95+)
  let best = s, bestScore = 0;
  for (const off of SKULAR) {
    const score = similarity(sl, off.toLowerCase());
    if (score > bestScore) { bestScore = score; best = off; }
  }
  return bestScore >= 0.95 ? best : s;
}

function similarity(a, b) {
  if (a === b) return 1;
  const la = a.replace(/[^a-zæøå0-9]/g,''), lb = b.replace(/[^a-zæøå0-9]/g,'');
  if (la === lb) return 1;
  if (!la.length || !lb.length) return 0;
  let matches = 0;
  const longer = la.length > lb.length ? la : lb;
  const shorter = la.length > lb.length ? lb : la;
  for (let i = 0; i < shorter.length; i++) {
    if (longer.includes(shorter[i])) matches++;
  }
  return matches / longer.length;
}

// ============================================================
// LOGGING
// ============================================================
const logBox = document.getElementById('logBox');
const BUILD_VERSION = '2026-03-03 08:42 UTC';

function log(type, msg) {
  logBox.classList.add('visible');
  const ts = new Date().toLocaleTimeString('no');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = `[${ts}] ${msg}`;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

function clearLog() {
  const vl = document.getElementById('versionLine');
  logBox.innerHTML = '';
  if (vl) logBox.appendChild(vl);
}

function setStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.classList.add('visible');
}

// ============================================================
// DROPZONES
// ============================================================
function setupDrop(zoneId, inputId, nameId, onFile) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const nameEl = document.getElementById(nameId);
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f, zone, nameEl, onFile);
  });
  input.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) setFile(f, zone, nameEl, onFile);
  });
}
function setFile(f, zone, nameEl, cb) {
  zone.classList.add('loaded');
  nameEl.textContent = f.name;
  cb(f);
  checkReady();
}
function checkReady() {
  document.getElementById('btnRun').disabled = !(bestFile && bekrFile && pyReady);
}

setupDrop('dropBest','fileBest','nameBest', f => { bestFile = f; });
setupDrop('dropBekr','fileBekr','nameBekr', f => { bekrFile = f; });

// ============================================================
// PYODIDE INIT
// ============================================================
async function initPyodide() {
  setStatus('Lastar Pyodide (første gong tek litt tid)…');
  try {
    pyodide = await loadPyodide();
    await pyodide.loadPackage('micropip');
    const micropip = pyodide.pyimport('micropip');
    setStatus('Installerer pdfminer.six…');
    await micropip.install('pdfminer.six');
    pyReady = true;
    setStatus('Klar – last opp PDF-ane og trykk Analyser');
    log('ok', 'Pyodide + pdfminer.six klar');
    checkReady();
  } catch(e) {
    log('err', 'Pyodide-feil: ' + e.message);
    setStatus('Feil ved lasting av Pyodide: ' + e.message);
  }
}
{
  const vl = document.createElement('div');
  vl.id = 'versionLine';
  vl.className = 'info';
  vl.textContent = 'Versjon: ' + BUILD_VERSION;
  logBox.classList.add('visible');
  logBox.appendChild(vl);
}
initPyodide();

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

let sortOrder = 'dato';
let lastBest = [], lastBekr = [], lastKomb = [];
function setSortOrder(o) {
  sortOrder = o;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort' + o.charAt(0).toUpperCase() + o.slice(1)).classList.add('active');
  if (lastBest.length) {
    renderTable('tab-bestilling', lastBest, 'bestilling');
    renderTable('tab-bekreftelse', lastBekr, 'bekreftelse');
    renderKombinert(lastKomb);
    renderAvvik(lastKomb);
  }
}
function sortData(arr, keyFn) {
  return [...arr].sort((a,b) => {
    if (sortOrder === 'skole') {
      const s = (keyFn(a)||'').localeCompare(keyFn(b)||'');
      if (s !== 0) return s;
    }
    return (a.dato||'').localeCompare(b.dato||'') || (keyFn(a)||'').localeCompare(keyFn(b)||'');
  });
}

// ============================================================
// RESET
// ============================================================
document.getElementById('btnReset').addEventListener('click', () => {
  bestFile = null; bekrFile = null;
  ['dropBest','dropBekr'].forEach(id => document.getElementById(id).classList.remove('loaded'));
  ['nameBest','nameBekr'].forEach(id => document.getElementById(id).textContent = '');
  ['fileBest','fileBekr'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('results').classList.remove('visible');
  clearLog();
  checkReady();
  if (pyReady) setStatus('Klar – last opp PDF-ane og trykk Analyser');
});

// ============================================================
// PYTHON PARSE-KODE
// ============================================================
const PYTHON_CODE = `
import sys, io, re
from pdfminer.layout import LAParams, LTTextLine
from pdfminer.pdfpage import PDFPage
from pdfminer.pdfinterp import PDFResourceManager, PDFPageInterpreter
from pdfminer.converter import PDFPageAggregator
import json

def get_items(data):
    items = []
    rsrcmgr = PDFResourceManager()
    device = PDFPageAggregator(rsrcmgr, laparams=LAParams())
    interpreter = PDFPageInterpreter(rsrcmgr, device)
    f = io.BytesIO(bytes(data))
    for pn, page in enumerate(PDFPage.get_pages(f)):
        interpreter.process_page(page)
        layout = device.get_result()
        for el in layout:
            if hasattr(el, '__iter__'):
                for line in el:
                    if hasattr(line, 'get_text'):
                        t = line.get_text().strip()
                        if t:
                            items.append({
                                'page': pn+1,
                                'x': round(line.x0),
                                'y': round(line.y0),
                                'raw': t
                            })
    return items

def decode(text):
    NORDIC = {0x62: 'æ', 0x63: 'ø', 0x64: 'å'}
    r = ''
    for c in text:
        code = ord(c)
        if code in NORDIC:
            r += NORDIC[code]
        elif 0x21 <= code <= 0x7e:
            r += chr(code + 29)
        elif 0x13 <= code <= 0x1c:
            r += str(code - 0x13)
        elif code == 0x1d:
            r += ':'
        elif code in (0x10, 0x11):
            r += ' '
        elif code == 0x03:
            r += ' '
        else:
            r += c
    return r

MONTH = {'januar':'01','februar':'02','mars':'03','april':'04','mai':'05',
         'juni':'06','juli':'07','august':'08','september':'09',
         'oktober':'10','november':'11','desember':'12'}

SKIP = re.compile(
    r'Tildelt|Avgang|Retur|Tekst til|skole til|Norske teatret|Dikemark|'
    r'avreise|Vakttelefon|DKS |bestiller|betaler|elevene|kollektiv|RUFUS|'
    r'Ordrenr|faktura|Dette|sendes|epost|Totalt|Vy Buss|Hovudscenen|'
    r'Kristian|Oslo|0164|henter|Plantasjen|klasse|Nesvangen|Nesbukta|'
    r'Sokkabekk|Bakkekroken|Semsveien|Breivikveien|Skoledalen|Skoleveien|'
    r'Frydenlund.*skole til|Frydenlund.*Norske',
    re.I)
SCHOOL = re.compile(r'\\b(skole|barneskole|ungdomsskole|School|Montessori|Montessoriskole|Steinerskolen)\\b', re.I)

def decode_time_raw(raw):
    # Dekod avgang/retur frå råbytes
    # Format: \\x04\\x03$YJDQJ\\x1d\\x03<tid>\\x03\\x10\\x035HWXU\\x1d\\x03<tid>
    codes = [ord(c) for c in raw]
    
    def read_time(start):
        t = ''
        for i in range(start, len(codes)):
            b = codes[i]
            if 0x13 <= b <= 0x1c:
                t += str(b - 0x13)
            elif b == 0x1d:
                t += ':'
            else:
                break
        return t if re.match(r'^\\d{2}:\\d{2}$', t) else ''
    
    # Finn $YJDQJ = 0x24 0x59 0x4a ...
    avg_idx = -1
    for i in range(len(codes)-5):
        if codes[i]==0x24 and codes[i+1]==0x59 and codes[i+2]==0x4a:
            avg_idx = i; break
    if avg_idx == -1:
        return '', ''
    avgang = read_time(avg_idx + 8)  # 6 bytes + \\x1d\\x03
    
    # Finn 5HWXU = 0x35 0x48 0x57 ...
    ret_idx = -1
    for i in range(avg_idx+8, len(codes)-4):
        if codes[i]==0x35 and codes[i+1]==0x48 and codes[i+2]==0x57:
            ret_idx = i; break
    retur = read_time(ret_idx + 7) if ret_idx != -1 else ''  # 5 bytes + \\x1d\\x03
    
    return avgang, retur

def decode_tildelt_raw(raw):
    # Format: \\x18\\x0b\\x15\\x19\\x0c\\x1d\\x037LOGHOW
    # \\x0b='(' og \\x0c=')' i fontenkodinga.
    # "5(27)" = trinn 5, 27 elevar: bruk SISTE \\x0b (innste parentes)
    # slik at berre elevtalet (27) vert henta, ikkje trinnnummeret (5).
    codes = [ord(c) for c in raw]
    try:
        cb = codes.index(0x0c)  # Første ')'
        # Finn siste '(' FØR ')' for å handtere "trinn(elevar)"-format
        ob = -1
        for i in range(cb):
            if codes[i] == 0x0b:
                ob = i
        if ob == -1:
            return 0
        numstr = ''.join(str(b-0x13) for b in codes[ob+1:cb] if 0x13 <= b <= 0x1c)
        return int(numstr) if numstr else 0
    except ValueError:
        pass
    return 0

def is_avgang_line(raw):
    codes = [ord(c) for c in raw]
    for i in range(len(codes)-2):
        if codes[i]==0x24 and codes[i+1]==0x59 and codes[i+2]==0x4a:
            return True
    return False

def is_tildelt_line(raw):
    return '7LOGHOW' in raw

def parse_bestilling(data):
    items = get_items(data)
    items.sort(key=lambda i: (i['page'], -i['y'], i['x']))
    
    entries = []
    current_dato = ''
    current_arena = 'Det Norske Teatret'
    
    for it in items:
        x, raw = it['x'], it['raw']
        text = decode(raw)
        
        # Dato: x~211
        if 200 <= x <= 235:
            dm = re.match(r'^(\\d{1,2})\\s+(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)\\s+(\\d{4})$', text, re.I)
            if dm:
                current_dato = f"{dm.group(1).zfill(2)}.{MONTH[dm.group(2).lower()]}.{dm.group(3)[-2:]}"
            continue
        
        # Arena: x~332-370
        if 320 <= x <= 375:
            if 'Det Norske Teatret' in text: current_arena = 'Det Norske Teatret'
            elif text.startswith('Dikemark'): current_arena = 'Dikemark'
            continue
        
        # Berre deltakarar-kolonne: x~406
        if not (390 <= x <= 490):
            continue
        
        # Tildelt
        if is_tildelt_line(raw):
            n = decode_tildelt_raw(raw)
            if n > 0 and entries:
                entries[-1]['elever'] += n
            continue
        
        # Avgang/Retur
        if is_avgang_line(raw):
            avg, ret = decode_time_raw(raw)
            if entries:
                e = entries[-1]
                if not e['avgang'] and avg: e['avgang'] = avg
                if not e['retur'] and ret: e['retur'] = ret
                if not avg: e['transport'] = 'RUFUS'
            continue
        
        # RUFUS
        if re.search(r'RUFUS|kollektiv transport', text, re.I):
            if entries: entries[-1]['transport'] = 'RUFUS'
            continue
        
        # Skulnamn
        if SCHOOL.search(text) and not SKIP.search(text):
            skole = re.sub(r'\\s*\\d{4}\\s+\\w.*$', '', text).replace(',','').strip().rstrip(':')
            if len(skole) > 3:
                entries.append({
                    'skole': skole,
                    'dato': current_dato,
                    'arena': current_arena,
                    'elever': 0,
                    'avgang': '',
                    'retur': '',
                    'transport': 'Buss'
                })
    
    return entries

def parse_bekreftelse(data):
    items = get_items(data)
    entries = []
    # Ankerpunkt: dato-element i Start-kolonne (x=118)
    xs = sorted(set(it['x'] for it in items))
    print('BEKR x-koordinatar:', xs[:20])
    print('BEKR total items:', len(items))
    # Enkel string-sjekk - unngår regex-problem
    def er_dato(s):
        s = s.strip()
        if len(s) not in (8, 10):
            return False
        return s[2]=='.' and s[5]=='.' and s[:2].isdigit() and s[3:5].isdigit() and s[6:].isdigit()
    dato_items = [it for it in items if 115<=it['x']<=125 and er_dato(it['raw'])]
    print('BEKR dato items:', len(dato_items))
    for dato_it in dato_items:
        page, y_dato = dato_it['page'], dato_it['y']
        dato_raw = dato_it['raw'].strip()
        dato = dato_raw[:6] + dato_raw[-2:]  # normaliser til DD.MM.YY
        y_tid = y_dato - 11
        def get(x_min, x_max, y, tol=4):
            return [it for it in items if it['page']==page and x_min<=it['x']<=x_max and abs(it['y']-y)<=tol]
        # Avgang og slutt
        avg = get(115, 130, y_tid)
        avgang = avg[0]['raw'] if avg else ''
        slt = get(163, 175, y_tid)
        slutt = slt[0]['raw'] if slt else ''
        # Ant
        ant = get(363, 380, y_dato)
        elever = 0
        for it in ant:
            m = re.match(r'^(\\d+)$', it['raw'])
            if m: elever = int(m.group(1)); break
        # Beskrivelse: x=257, y_dato og y_tid (og ev. y_tid-11 for trelinjerader)
        besk_parts = []
        for y_check in [y_dato, y_tid]:
            b = get(255, 295, y_check)
            besk_parts += [it['raw'] for it in sorted(b, key=lambda i: -i['y'])]
        b3 = [it for it in items if it['page']==page and it['x']==257 and y_tid-16<=it['y']<y_tid-4]
        besk_parts += [it['raw'] for it in sorted(b3, key=lambda i: -i['y'])]
        besktext = ' '.join(besk_parts).strip()
        # Fra: x=77
        fra_parts = []
        for y_check in [y_dato, y_tid, y_tid-11]:
            f = get(75, 115, y_check)
            fra_parts += [it['raw'] for it in sorted(f, key=lambda i: -i['y'])]
        fra_text = ' '.join(fra_parts).lower()
        # Minibuss og retning
        minibuss = bool(re.search(r'\\*minibuss\\*', besktext, re.I))
        besk_clean = re.sub(r'\\*minibuss\\*\\s*', '', besktext, flags=re.I).strip()
        skole = ''
        retning = ''
        fwd = re.search(r'^(.+?)\\s*[-\u2013]\\s*Det\\s+Norske', besk_clean, re.I)
        rev = re.search(r'Det\\s+Norske[^-\u2013]*[-\u2013]\\s*(.+)', besk_clean, re.I)
        fra_er_arena = 'det norske' in fra_text
        if fwd and not fra_er_arena:
            skole = fwd.group(1).strip(); retning = 'TUR'
        elif rev and fra_er_arena:
            skole = rev.group(1).strip(); retning = 'RETUR'
        elif fwd:
            skole = fwd.group(1).strip()
            retning = 'RETUR' if fra_er_arena else 'TUR'
        elif rev:
            skole = rev.group(1).strip()
            retning = 'TUR' if not fra_er_arena else 'RETUR'
        if skole and dato and re.match(r'\\d{2}:\\d{2}', avgang):
            entries.append({'skole': skole, 'dato': dato, 'avgang': avgang,
                           'slutt': slutt, 'elever': elever, 'retning': retning, 'minibuss': minibuss})
    return entries

document.getElementById('btnRun').addEventListener('click', async () => {

    const bekrBuf = await bekrFile.arrayBuffer();

    setStatus('Parser PDF-ar med pdfminer…');
    // Konverter til base64 og send som streng
    function toBase64(buf) {
      let binary = '';
      const bytes = new Uint8Array(buf);
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }
    const bestB64 = toBase64(bestBuf);
    const bekrB64 = toBase64(bekrBuf);
    pyodide.globals.set('best_b64', bestB64);

// ============================================================
// KOMBINER bestilling + bekreftelse
// ============================================================
function byggKombinert(best, bekr) {
  // Set av RUFUS-skulnamn (normalisert, rå og kjerne) for sjekk av bekreftelse-berre-rader
  const rufusSkular = new Set();
  for (const b of best) {
    if (b.transport === 'RUFUS') {
      const n = b.skule_norm || b.skole;
      rufusSkular.add(n);
      rufusSkular.add(n.toLowerCase());
      if (b.skole) { rufusSkular.add(b.skole); rufusSkular.add(b.skole.toLowerCase()); }
    }
  }
  function isRufusByName(skole) {
    if (!skole) return false;
    if (rufusSkular.has(skole) || rufusSkular.has(skole.toLowerCase())) return true;
    const k = skolKjerne(skole.toLowerCase());
    if (k.length <= 2) return false;
    for (const r of rufusSkular) {
      if (skolKjerne(r) === k) return true;
    }
    return false;
  }

  // Grupper bekreftelse etter normalisert skulnamn.
  // turer: array av alle TUR-rader (t.d. fleire bussar for same skule+dato)
  const bekrMap = {};
  for (const e of bekr) {
    const key = e.skule_norm + '|' + e.dato;
    if (!bekrMap[key]) bekrMap[key] = { turer: [], retur: null };
    if (e.retning === 'TUR') bekrMap[key].turer.push(e);
    else bekrMap[key].retur = e;
  }

  const rows = [];
  for (const b of best) {
    const key = b.skule_norm + '|' + b.dato;
    const bk = bekrMap[key] || {};
    const bkTur = (bk.turer && bk.turer.length > 0) ? bk.turer[0] : null;
    const bkRetur = bk.retur || null;
    // Sum elevar over alle TUR-rader (t.d. to bussar med 34+35=69 elevar)
    const bkEleverTot = bk.turer ? bk.turer.reduce((s, t) => s + (t.elever || 0), 0) : 0;

    // Samanlikn (RUFUS treng ikkje bekreftelse - generer aldri avvik for dei)
    const avvik = [];
    if (b.transport !== 'RUFUS') {
      if (!bkTur && !bkRetur) avvik.push('Manglar i bekreftelse');
      if (bkTur) {
        if (b.avgang && bkTur.avgang && b.avgang !== bkTur.avgang)
          avvik.push(`Avgang: best=${b.avgang} bekr=${bkTur.avgang}`);
        if (b.elever && bkEleverTot && Math.abs(b.elever - bkEleverTot) > 2)
          avvik.push(`Elevar: best=${b.elever} bekr=${bkEleverTot}`);
      }
    }

    rows.push({
      dato: b.dato,
      skole: b.skule_norm || b.skole,
      arena: b.arena,
      best: b,
      bkTur,
      bkRetur,
      bkEleverTot,
      avvik
    });

    // Fjern frå map (for å finne "berre i bekreftelse")
    delete bekrMap[key];
  }

  // Ting som er i bekreftelse men ikkje i bestilling
  for (const [key, bk] of Object.entries(bekrMap)) {
    const e = (bk.turer && bk.turer.length > 0) ? bk.turer[0] : bk.retur;
    if (!e) continue;
    const bkEleverTot = bk.turer ? bk.turer.reduce((s, t) => s + (t.elever || 0), 0) : 0;
    rows.push({
      dato: e.dato,
      skole: e.skule_norm || e.skole,
      arena: '',
      best: null,
      bkTur: (bk.turer && bk.turer.length > 0) ? bk.turer[0] : null,
      bkRetur: bk.retur,
      bkEleverTot,
      avvik: ['Manglar i bestilling']
    });
  }

  // Skill RUFUS/gange frå buss
  rows.forEach(r => {
    if (r.best) {
      r._transport = r.best.transport || 'Buss';
    } else {
      // Bekreftelse-only: sjekk om skulen er RUFUS i bestilling (robust namnesjekk)
      r._transport = isRufusByName(r.skole) ? 'RUFUS' : 'Ukjend';
    }
  });
  // Sorter: dato/skole, RUFUS/gange nedst
  rows.sort((a, b) => {
    const aRufus = a._transport === 'RUFUS' || a._transport === 'GANGE';
    const bRufus = b._transport === 'RUFUS' || b._transport === 'GANGE';
    if (aRufus !== bRufus) return aRufus ? 1 : -1;
    if (sortOrder === 'skole') {
      const s = (a.skole||'').localeCompare(b.skole||'');
      if (s !== 0) return s;
    }
    return (a.dato||'').localeCompare(b.dato||'') || (a.skole||'').localeCompare(b.skole||'');
  });

  return rows;
}

// ============================================================
// RENDER
// ============================================================
const COL_BEST = ['Dato','Skule','Arena','Avgang','Retur','Elevar','Transport'];
const COL_BEKR = ['Dato','Skule','Retning','Avgang','Slutt','Elevar','Minibuss'];
const COL_KOMB = ['Dato','Skule','Arena','Avgang (best)','Avgang (bekr)','Retur (bekr)','Elevar (best)','Elevar (bekr)','Transport','Status'];

function renderSummary(best, bekr, komb) {
  const avvik = komb.filter(r => r.avvik.length > 0).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="n">${best.length}</div><div class="l">I bestilling</div></div>
    <div class="stat"><div class="n">${bekr.length}</div><div class="l">Rader i bekreftelse</div></div>
    <div class="stat"><div class="n">${komb.length}</div><div class="l">Unike skular</div></div>
    <div class="stat" style="border-color:${avvik>0?'var(--warn)':'var(--ok)'}">
      <div class="n" style="color:${avvik>0?'var(--warn)':'var(--ok)'}">${avvik}</div>
      <div class="l">Avvik</div>
    </div>
  `;
}

function th(cols) {
  return '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead>';
}

function copyTableCSV(panelId) {
  const table = document.querySelector('#' + panelId + ' table');
  if (!table) return;
  const rows = [];
  for (const tr of table.querySelectorAll('tr')) {
    const cells = [...tr.querySelectorAll('th, td')].map(c => c.textContent.trim().replace(/\s+/g, ' '));
    rows.push(cells.join('\t'));
  }
  navigator.clipboard.writeText(rows.join('\n')).then(() => {
    const btn = document.querySelector('#' + panelId + ' .csv-btn');
    if (btn) {
      btn.textContent = '✓ Kopiert!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '⎘ Kopier som CSV'; btn.classList.remove('copied'); }, 2000);
    }
  });
}

function csvBtn(panelId) {
  return '<div class="csv-row"><button class="csv-btn" onclick="copyTableCSV(\'' + panelId + '\')">⎘ Kopier som CSV</button></div>';
}

function badge(txt, cls) {
  return `<span class="badge ${cls}">${txt}</span>`;
}

function renderTable(id, data, type) {
  const el = document.getElementById(id);
  if (!data.length) { el.innerHTML = '<div class="empty">Ingen data</div>'; return; }

  let rows = '';
  if (type === 'bestilling') {
    const sorted = sortData(data, e => e.skule_norm||e.skole);
    const buss = sorted.filter(e => e.transport !== 'RUFUS' && e.transport !== 'GANGE');
    const rufus = sorted.filter(e => e.transport === 'RUFUS');
    const gange = sorted.filter(e => e.transport === 'GANGE');
    for (const e of [...buss, ...gange, ...rufus]) {
      const isGange = e.transport === 'GANGE';
      const isRufus = e.transport === 'RUFUS';
      const cls = isGange ? 'gange' : '';
      rows += `<tr class="${cls}">
        <td>${e.dato||''}</td>
        <td>${e.skule_norm||e.skole}</td>
        <td>${e.arena||''}</td>
        <td>${e.avgang||'–'}</td>
        <td>${e.retur||'–'}</td>
        <td>${e.elever||'–'}</td>
        <td>${isRufus ? badge('RUFUS','badge-rufus') : isGange ? badge('Gange','badge-gange') : badge('Buss','badge-buss')}</td>
      </tr>`;
    }
    el.innerHTML = csvBtn(id) + '<div class="tbl-wrap"><table>' + th(COL_BEST) + '<tbody>' + rows + '</tbody></table></div>';
  } else {
    const sorted = sortData(data, e => e.skule_norm||e.skole);
    const grouped = {};
    for (const e of sorted) {
      const key = (e.skule_norm||e.skole) + '|' + e.dato;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(e);
    }
    let first = true;
    for (const [key, grp] of Object.entries(grouped)) {
      grp.sort((a,b) => a.retning === 'TUR' ? -1 : 1);
      grp.forEach((e, i) => {
        const cls = (i===0 && !first ? 'group-start ' : '') + (e.retning==='RETUR' ? 'retur' : 'tur');
        rows += `<tr class="${cls}">
          <td>${e.dato||''}</td>
          <td>${e.skule_norm||e.skole}</td>
          <td>${badge(e.retning, e.retning==='TUR'?'badge-tur':'badge-retur')}</td>
          <td>${e.avgang||'–'}</td>
          <td>${e.slutt||'–'}</td>
          <td>${e.elever||'–'}</td>
          <td>${e.minibuss ? '🚐' : ''}</td>
        </tr>`;
      });
      first = false;
    }
    el.innerHTML = csvBtn(id) + '<div class="tbl-wrap"><table>' + th(COL_BEKR) + '<tbody>' + rows + '</tbody></table></div>';
  }
}

function renderKombinert(komb) {
  const el = document.getElementById('tab-kombinert');
  if (!komb.length) { el.innerHTML = '<div class="empty">Ingen data</div>'; return; }
  const sorted = sortData(komb, r => r.skole);
  let rows = '';
  let prevSkole = '';
  for (const r of sorted) {
    const isNew = r.skole !== prevSkole;
    prevSkole = r.skole;
    const hasAvvik = r.avvik.length > 0;
    const mangler = r.avvik.some(a => a.includes('Manglar'));
    const isRufus = r._transport === 'RUFUS';
    const isGange = r._transport === 'GANGE';
    const cls = (isNew && rows ? 'group-start ' : '') + (mangler ? 'mangler' : hasAvvik ? 'avvik' : isGange ? 'gange' : '');

    const bkAvg = r.bkTur ? r.bkTur.avgang : '';
    const bkRet = r.bkRetur ? r.bkRetur.avgang : (r.bkTur ? r.bkTur.slutt : '');
    const bkElev = r.bkEleverTot || '';
    const statusBadge = mangler ? badge('MANGLAR','badge-mangler') : hasAvvik ? badge('AVVIK','badge-avvik') : '✓';
    const avvikAvg = r.avvik.some(a => a.startsWith('Avgang:'));
    const avvikElev = r.avvik.some(a => a.startsWith('Elevar:'));
    const hlAvg = avvikAvg ? ' style="background:#ffe082!important"' : '';
    const hlElev = avvikElev ? ' style="background:#ffe082!important"' : '';

    rows += `<tr class="${cls}">
      <td>${r.dato||''}</td>
      <td>${r.skole||''}</td>
      <td>${r.arena||''}</td>
      <td${hlAvg}>${r.best ? (r.best.avgang||'–') : '–'}</td>
      <td${hlAvg}>${bkAvg||'–'}</td>
      <td>${bkRet||'–'}</td>
      <td${hlElev}>${r.best ? (r.best.elever||'–') : '–'}</td>
      <td${hlElev}>${bkElev||'–'}</td>
      <td>${r.best ? (r.best.transport==='RUFUS' ? badge('RUFUS','badge-rufus') : r.best.transport==='GANGE' ? badge('Gange','badge-gange') : badge('Buss','badge-buss')) : '–'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }
  el.innerHTML = csvBtn('tab-kombinert') + '<div class="tbl-wrap"><table>' + th(COL_KOMB) + '<tbody>' + rows + '</tbody></table></div>';
}

function renderAvvik(komb) {
  // RUFUS treng ikkje bekreftelse - filtrer dei ut frå avvik-lista
  const avvik = komb.filter(r => r.avvik.length > 0 && r._transport !== 'RUFUS');
  const el = document.getElementById('tab-avvik');
  if (!avvik.length) { el.innerHTML = '<div class="empty" style="color:var(--ok)">✓ Ingen avvik funne</div>'; return; }
  let rows = '';
  for (const r of avvik) {
    const mangler = r.avvik.some(a => a.includes('Manglar'));
    const cls = mangler ? 'mangler' : 'avvik';
    rows += `<tr class="${cls}">
      <td>${r.dato||''}</td>
      <td>${r.skole||''}</td>
      <td>${r.arena||''}</td>
      <td>${r.best ? (r.best.avgang||'–') : '–'}</td>
      <td>${r.bkTur ? (r.bkTur.avgang||'–') : '–'}</td>
      <td>${r.best ? (r.best.elever||'–') : '–'}</td>
      <td>${r.bkEleverTot || '–'}</td>
      <td>${r.avvik.join('; ')}</td>
    </tr>`;
  }
  const cols = ['Dato','Skule','Arena','Avgang (best)','Avgang (bekr)','Elevar (best)','Elevar (bekr)','Avvik'];
  el.innerHTML = '<div class="tbl-wrap"><table>' + th(cols) + '<tbody>' + rows + '</tbody></table></div>';
}
