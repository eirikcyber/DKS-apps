<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DKS Program – Asker</title>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DKS Program">
  <meta name="theme-color" content="#005B8E">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="dks-icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --blaa: #005B8E;
      --blaa-mork: #004068;
      --blaa-lys: #d6e8f3;
      --sand: #C8B89A;
      --sand-lys: #f5efe8;
      --gul: #E8B84B;
      --svart: #1a1a1a;
      --graa: #6b6b6b;
      --graa-lys: #f0ede9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--sand-lys);
      color: var(--svart);
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    header {
      background: var(--blaa);
      color: white;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      padding-top: calc(13px + env(safe-area-inset-top, 0px));
    }
    .back-link {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      padding: 4px 6px;
      margin-left: -6px;
      border-radius: 4px;
    }
    .back-link:hover { color: white; background: rgba(255,255,255,0.1); }
    .header-title { flex: 1; }
    .header-title h1 { font-size: 18px; font-weight: 500; line-height: 1.2; }
    .header-title p  { font-size: 11.5px; opacity: 0.6; font-weight: 300; margin-top: 2px; }
    .refresh-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      color: white;
      font-size: 19px;
      width: 36px; height: 36px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:hover  { background: rgba(255,255,255,0.2); }
    .refresh-btn:active { background: rgba(255,255,255,0.28); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

    /* ── LOADING ── */
    #loading-overlay { display: none; padding: 72px 32px 48px; text-align: center; }
    #loading-overlay.vis { display: block; }
    .big-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--sand);
      border-top-color: var(--blaa);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    .loading-label { font-size: 14px; color: var(--svart); margin-bottom: 5px; }
    .loading-skule { font-size: 12.5px; color: var(--graa); min-height: 18px; }
    .prog-wrap {
      width: 200px; height: 4px;
      background: var(--sand); border-radius: 2px;
      margin: 12px auto 0; overflow: hidden;
    }
    .prog-fill { height: 100%; background: var(--blaa); border-radius: 2px; transition: width 0.2s; }

    /* ── FEIL ── */
    #feil-melding { display: none; padding: 64px 32px; text-align: center; }
    #feil-melding.vis { display: block; }
    #feil-melding p { color: var(--graa); font-size: 14px; line-height: 1.65; }
    #feil-melding button {
      margin-top: 22px; padding: 10px 26px;
      background: var(--blaa); color: white; border: none;
      border-radius: 8px; font-size: 14px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
    }

    /* ── OFFLINE ── */
    #offline-banner {
      display: none; background: #7a5c10;
      color: rgba(255,255,255,0.9);
      font-size: 12.5px; font-weight: 300;
      padding: 8px 16px; text-align: center;
    }
    #offline-banner.vis { display: block; }

    /* ── DATO-INFO ── */
    .dato-info {
      padding: 8px 16px; font-size: 12px;
      color: var(--graa); background: white;
      border-bottom: 1px solid var(--graa-lys);
    }

    /* ── PRODUKSJONSFILTER ── */
    #prod-filter {
      display: none;
      background: white;
      border-bottom: 1px solid var(--graa-lys);
      padding: 10px 12px;
    }
    #prod-filter.vis { display: block; }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-chip {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1.5px solid var(--sand);
      background: white;
      color: var(--svart);
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-chip:hover   { border-color: var(--blaa); }
    .filter-chip.active  { background: var(--blaa); border-color: var(--blaa); color: white; }

    /* ── EVENTS ── */
    #events-container { display: none; padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)); }
    #events-container.vis { display: block; }

    .dag-gruppe { animation: fadeIn 0.25s ease both; }

    /* Date header – clickable, sticky */
    .dag-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 9px;
      position: sticky;
      top: 0;
      background: var(--sand-lys);
      z-index: 5;
      border-bottom: 1px solid var(--sand);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dag-header:active { background: #ede7de; }
    .dag-venstre { display: flex; align-items: baseline; gap: 8px; }
    .dag-namn {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blaa-mork);
    }
    .dag-tel {
      font-size: 11px;
      color: var(--graa);
      background: var(--graa-lys);
      padding: 1px 8px;
      border-radius: 10px;
    }
    .dag-chevron {
      font-size: 14px;
      color: var(--graa);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .dag-gruppe.collapsed .dag-chevron  { transform: rotate(-90deg); }
    .dag-gruppe.collapsed .dag-events   { display: none; }

    .dag-events { padding: 6px 0 10px; }

    /* ── KORT (collapsible) ── */
    .event-kort {
      background: white;
      margin: 0 10px 6px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-left: 3px solid var(--blaa);
    }

    /* Clickable header row of each card */
    .ev-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ev-header:active { background: #f8f6f3; }

    .ev-tid {
      font-size: 13px;
      font-weight: 600;
      color: var(--blaa);
      letter-spacing: 0.05em;
      flex-shrink: 0;
      width: 42px;
    }
    .ev-info { flex: 1; min-width: 0; }
    .ev-prod {
      font-size: 15px;
      font-weight: 500;
      color: var(--svart);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
    }
    .ev-lok-row {
      font-size: 12px;
      color: var(--graa);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .ev-chevron {
      font-size: 15px;
      color: var(--graa);
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .event-kort.open .ev-chevron { transform: rotate(90deg); }

    /* Expanded details */
    .ev-details {
      display: none;
      padding: 0 14px 12px 14px;
      border-top: 1px solid var(--graa-lys);
    }
    .event-kort.open .ev-details { display: block; }

    .ev-details-row {
      font-size: 13px;
      color: var(--graa);
      line-height: 1.9;
      padding-top: 9px;
    }

    .ev-kontakt {
      font-size: 12px;
      color: var(--graa);
      line-height: 1.9;
      margin-top: 7px;
    }
    .ev-kontakt a { color: var(--blaa); text-decoration: none; }
    .ev-kontakt a:hover { text-decoration: underline; }

    .ev-knappar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .ev-kal-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      background: var(--blaa-lys);
      color: var(--blaa-mork);
      border-radius: 6px;
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }
    .ev-kal-btn:hover { background: #bcd8ee; }

    .tom-melding {
      padding: 64px 32px; text-align: center;
      font-size: 14px; color: var(--graa); line-height: 1.7;
    }

    /* ── TABS ── */
    .tab-nav {
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.85); }
    .tab-btn.active { color: white; border-bottom-color: white; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="back-link" href="index.html">←</a>
    <div class="header-title">
      <h1>DKS Program</h1>
      <p id="header-subtitle">Asker-skular · resten av skuleåret</p>
      <p id="header-status" style="font-size:10px;opacity:0.55;font-weight:300;margin-top:2px;min-height:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;"></p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
      <button class="refresh-btn" id="refresh-btn" title="Oppdater" onclick="forceRefresh()">↻</button>
      <span id="ver-txt" style="font-size:9px;opacity:0.45;color:white;letter-spacing:0.03em"></span>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="grunnskule" onclick="switchTab('grunnskule')">Grunnskule</button>
    <button class="tab-btn" data-tab="vgs" onclick="switchTab('vgs')">VGS</button>
  </div>
</header>

<div id="offline-banner">Viser bufra data – sist oppdatert <span id="cache-age-txt"></span></div>

<div id="loading-overlay">
  <div class="big-spinner"></div>
  <p class="loading-label" id="loading-label">Hentar arrangement for alle Asker-skular…</p>
  <p class="loading-skule" id="loading-skule"></p>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div id="feil-melding">
  <p id="feil-tekst">Klarte ikkje hente data. Sjekk at du er tilkopla internett og prøv igjen.</p>
  <button onclick="forceRefresh()">Prøv igjen</button>
</div>

<div id="dato-info-wrap"></div>
<div id="prod-filter"><div class="filter-chips" id="filter-chips"></div></div>
<div id="events-container"></div>

<script>
const API_URL = 'https://portal.denkulturelleskolesekken.no/api/wordpress/productions/get_calendar_events';
const API_BODY_BASE = {
  view: 'calendar', sort: 'date', academicYearId: '', skip: 0, limit: 1000,
  openAllEvents: false, datePeriods: [], includeEvents: true,
  hideUnspecifiedLocationName: true, includeSchoolDetails: true,
};
const MAX_AGE = 4 * 60 * 60 * 1000;

const TABS = {
  grunnskule: {
    label: 'Grunnskule',
    cacheKey: 'dks_program_v3',
    apiBody: {...API_BODY_BASE, wordpressHomeUrl: 'https://www.denkulturelleskolesekken.no/asker'},
    vgsFilter: null,
    rawEvents: null, currentEvents: [], fetchedAt: null,
    activeFilters: new Set(), isFetching: false,
  },
  vgs: {
    label: 'VGS',
    cacheKey: 'dks_program_vgs_v1',
    apiBody: {...API_BODY_BASE, wordpressHomeUrl: 'https://www.denkulturelleskolesekken.no/akershus'},
    vgsFilter: [
      'asker videregående skole',
      'bleiker videregående skole',
      'nesbru videregående skole',
      'holmen videregående skole',
      'røyken videregående skole',
    ],
    rawEvents: null, currentEvents: [], fetchedAt: null,
    activeFilters: new Set(), isFetching: false,
  },
};
let activeTab = 'grunnskule';

// ── Hjelpefunksjonar ──────────────────────────────────────────────

const el = id => document.getElementById(id);

// Versjonsdato frå sist endra fil
(function() {
  const d = new Date(document.lastModified);
  const p = n => String(n).padStart(2,'0');
  el('ver-txt').textContent = `v ${p(d.getDate())}.${p(d.getMonth()+1)}.${String(d.getFullYear()).slice(2)} ${p(d.getHours())}:${p(d.getMinutes())}`;
})();

function strVal(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (typeof v === 'object') return v.name || v.title || '';
  return String(v);
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Produksjonsnamn utan parentes-suffiks
function prodKortNamn(ev) {
  const full = strVal(ev.production) || strVal(ev.tour) || '';
  const idx  = full.indexOf('(');
  return (idx > 0 ? full.slice(0, idx) : full).trim();
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString('nb-NO', {hour: '2-digit', minute: '2-digit'});
}

function fmtDateHeader(d) {
  const s = d.toLocaleDateString('nb-NO', {weekday: 'long', day: 'numeric', month: 'long'});
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function fmtRelative(ts) {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1)  return 'akkurat no';
  if (mins < 60) return `${mins} min sidan`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs} t sidan`;
  return `${Math.floor(hrs / 24)} dag${Math.floor(hrs/24) > 1 ? 'ar' : ''} sidan`;
}

// ── ICS-kalender ──────────────────────────────────────────────────

function fmtICSDate(ts) {
  return new Date(ts * 1000).toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';
}

function makeICSHref(ev) {
  const title  = (strVal(ev.production) || strVal(ev.tour) || 'DKS-arrangement').replace(/[,;]/g, '');
  const lok    = (strVal(ev.location) || '').replace(/[,;]/g, '');
  const skular = (ev._schools || []).join(', ');
  const elevar = ev.numberOfStudents > 0 ? `Elevar: ${ev.numberOfStudents}` : '';
  const desc   = [skular ? `Skule: ${skular}` : '', elevar].filter(Boolean).join('\\n');
  const start  = fmtICSDate(ev.dateStart);
  const end    = fmtICSDate(ev.dateEnd || (ev.dateStart + 3600));

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//DKS Asker//DKS Program//NO',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:dks-${ev.id}@asker.dks`,
    `DTSTART:${start}`,
    `DTEND:${end}`,
    `SUMMARY:${title}`,
    `DESCRIPTION:${desc}`,
    `LOCATION:${lok}`,
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');

  return 'data:text/calendar;charset=utf8,' + encodeURIComponent(ics);
}

// ── Cache ─────────────────────────────────────────────────────────

function saveCache(tab, events) {
  try { localStorage.setItem(tab.cacheKey, JSON.stringify({ts: Date.now(), events})); } catch(_) {}
}

function loadCache(tab, allowStale = false) {
  try {
    const raw = localStorage.getItem(tab.cacheKey);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!allowStale && Date.now() - data.ts > MAX_AGE) return null;
    return data;
  } catch(_) { return null; }
}

// ── Filtrering og gruppering ──────────────────────────────────────

function filterEvents(events, tab) {
  const today = new Date(); today.setHours(0,0,0,0);
  const fromTs = today.getTime() / 1000;
  const filtered = events
    .filter(ev => {
      const ts = Number(ev.dateStart);
      if (isNaN(ts) || ts < fromTs) return false;
      if ((ev.status || '').includes('cancel')) return false;
      if (tab.vgsFilter) {
        const isVgsProd = (ev.production?.yearLevelMinimum ?? 0) >= 11;
        const names = (ev._schools || []).map(s => s.toLowerCase());
        const isAskerVgs = tab.vgsFilter.some(f => names.includes(f));
        if (!isVgsProd || !isAskerVgs) return false;
      }
      return true;
    })
    .sort((a, b) => a.dateStart - b.dateStart);
  return filtered;
}

function groupByDate(events) {
  const groups = new Map();
  for (const ev of events) {
    const d   = new Date(ev.dateStart * 1000);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups.has(key)) groups.set(key, {date: d, events: []});
    groups.get(key).events.push(ev);
  }
  return [...groups.values()];
}

// ── Rendering ─────────────────────────────────────────────────────

function renderKontakt(ev) {
  const schools = ev.schools || {};
  const list = Array.isArray(schools) ? schools : Object.values(schools);
  const lines = [];
  for (const s of list) {
    if (s.phone) {
      const tel = s.phone.replace(/\s/g, '');
      lines.push(`📞 Skule: <a href="tel:${tel}">${escHtml(s.phone)}</a>`);
    }
    for (const cp of (s.contactPersons || [])) {
      const parts = cp.split(',').map(p => p.trim());
      const name  = parts[0] || '';
      const phone = parts.find(p => /\+?\d[\d\s]{5,}/.test(p)) || '';
      if (phone) {
        const tel = phone.replace(/\s/g, '');
        lines.push(`👤 ${escHtml(name)}: <a href="tel:${tel}">${escHtml(phone)}</a>`);
      }
    }
  }
  return lines.length
    ? `<div class="ev-kontakt">${lines.join('<br>')}</div>`
    : '';
}

function renderCard(ev) {
  const tid    = escHtml(fmtTime(ev.dateStart));
  const prod   = escHtml(strVal(ev.production) || strVal(ev.tour) || '–');
  const lok    = strVal(ev.location);
  const skular = (ev._schools || []).join(', ') || '–';
  const elevar = ev.numberOfStudents > 0 ? ev.numberOfStudents : null;
  const icsHref = escHtml(makeICSHref(ev));

  return `<div class="event-kort">
    <div class="ev-header">
      <span class="ev-tid">${tid}</span>
      <div class="ev-info">
        <div class="ev-prod">${prod}</div>
        ${lok ? `<div class="ev-lok-row">📍 ${escHtml(lok)}</div>` : ''}
      </div>
      <span class="ev-chevron">›</span>
    </div>
    <div class="ev-details">
      <div class="ev-details-row">
        🏫 ${escHtml(skular)}${elevar !== null ? `<br>👥 ${elevar} elevar` : ''}
      </div>
      ${renderKontakt(ev)}
      <div class="ev-knappar">
        ${ev.production?.id ? `<a class="ev-kal-btn" href="https://www.denkulturelleskolesekken.no/utforsk-produksjoner-i-dks/?produksjon=${ev.production.id}" target="_blank" rel="noopener">🔗 Om produksjonen</a>` : ''}
        <a class="ev-kal-btn" href="${icsHref}" download="dks-arrangement.ics">📅 Legg til i kalender</a>
      </div>
    </div>
  </div>`;
}

function renderGroups(groups) {
  if (!groups.length) {
    return '<div class="tom-melding">Ingen planlagde arrangement resten av skuleåret.</div>';
  }
  return groups.map(({date, events}, i) =>
    `<div class="dag-gruppe" style="animation-delay:${Math.min(i*0.05,0.4)}s">
      <div class="dag-header">
        <div class="dag-venstre">
          <span class="dag-namn">${escHtml(fmtDateHeader(date))}</span>
          <span class="dag-tel">${events.length} arr.</span>
        </div>
        <span class="dag-chevron">›</span>
      </div>
      <div class="dag-events">
        ${events.map(renderCard).join('')}
      </div>
    </div>`
  ).join('');
}

// ── Interaksjon via event delegation ─────────────────────────────

el('events-container').addEventListener('click', e => {
  // Ikkje let lenkjer boble opp til ev-header
  if (e.target.closest('.ev-kal-btn')) return;

  const header = e.target.closest('.ev-header');
  if (header) {
    header.closest('.event-kort').classList.toggle('open');
    return;
  }

  const dagHdr = e.target.closest('.dag-header');
  if (dagHdr) {
    dagHdr.closest('.dag-gruppe').classList.toggle('collapsed');
  }
});

// ── Produksjonsfilter ─────────────────────────────────────────────

function buildProductionChips(tab) {
  const names = [...new Set(tab.currentEvents.map(prodKortNamn).filter(Boolean))].sort();
  const chips = el('filter-chips');

  if (!names.length) { el('prod-filter').classList.remove('vis'); return; }

  chips.innerHTML = names.map(name =>
    `<button class="filter-chip${tab.activeFilters.has(name) ? ' active' : ''}" data-prod="${escHtml(name)}">${escHtml(name)}</button>`
  ).join('');

  el('prod-filter').classList.add('vis');
}

el('filter-chips').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  const tab  = TABS[activeTab];
  const name = chip.dataset.prod;
  if (tab.activeFilters.has(name)) { tab.activeFilters.delete(name); chip.classList.remove('active'); }
  else                             { tab.activeFilters.add(name);    chip.classList.add('active'); }
  renderView();
});

// ── Skjermvisning ─────────────────────────────────────────────────

function showScreen(which) {
  el('loading-overlay').className  = which === 'loading' ? 'vis' : '';
  el('feil-melding').className     = which === 'error'   ? 'vis' : '';
  el('events-container').className = which === 'events'  ? 'vis' : '';
  el('dato-info-wrap').style.display  = which === 'events' ? '' : 'none';
  if (which !== 'events') el('prod-filter').classList.remove('vis');
}

function renderView() {
  const tab = TABS[activeTab];
  let evs = tab.currentEvents;
  if (tab.activeFilters.size > 0) {
    evs = evs.filter(ev => tab.activeFilters.has(prodKortNamn(ev)));
  }
  el('events-container').innerHTML = renderGroups(groupByDate(evs));
}

function renderEvents(tab, rawEvents, fetchedAt, isStale = false) {
  tab.rawEvents = rawEvents;
  tab.currentEvents = filterEvents(rawEvents, tab);
  tab.fetchedAt = fetchedAt;

  // Only update DOM if this tab is active
  if (tab !== TABS[activeTab]) return;

  buildProductionChips(tab);
  renderView();

  el('dato-info-wrap').innerHTML =
    `<div class="dato-info">Resten av skuleåret · ${tab.currentEvents.length} arrangement · oppdatert ${fmtRelative(fetchedAt)}</div>`;

  el('offline-banner').classList.toggle('vis', isStale);
  if (isStale) el('cache-age-txt').textContent = fmtRelative(fetchedAt);

  showScreen('events');
}

// ── API-henting ───────────────────────────────────────────────────

async function fetchAllEvents(tab) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(tab.apiBody),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  return d.events.map(ev => ({
    ...ev,
    _schools: (Array.isArray(ev.schools) ? ev.schools : Object.values(ev.schools || {}))
                .map(s => s.name),
  }));
}

// ── Tabb-navigasjon ───────────────────────────────────────────────

function switchTab(name) {
  if (name === activeTab) return;
  activeTab = name;

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });

  el('header-subtitle').textContent = name === 'vgs'
    ? 'Asker VGS · resten av skuleåret'
    : 'Asker-skular · resten av skuleåret';

  loadData();
}

// ── Hovudflyt ─────────────────────────────────────────────────────

async function loadData(force = false) {
  const tab = TABS[activeTab];
  if (tab.isFetching) return;

  if (!force) {
    if (tab.rawEvents !== null && tab.fetchedAt && Date.now() - tab.fetchedAt <= MAX_AGE) {
      renderEvents(tab, tab.rawEvents, tab.fetchedAt);
      return;
    }
    const cached = loadCache(tab);
    if (cached) { renderEvents(tab, cached.events, cached.ts); return; }
  }

  tab.isFetching = true;
  el('refresh-btn').classList.add('spinning');
  el('header-status').textContent = 'Hentar arrangement…';

  const staleData = tab.rawEvents !== null
    ? {events: tab.rawEvents, ts: tab.fetchedAt || 0}
    : loadCache(tab, true);

  if (staleData) {
    renderEvents(tab, staleData.events, staleData.ts, Date.now() - staleData.ts > MAX_AGE);
  } else {
    showScreen('loading');
  }

  try {
    const events = await fetchAllEvents(tab);
    saveCache(tab, events);
    renderEvents(tab, events, Date.now());
  } catch(err) {
    const s = loadCache(tab, true);
    if (s) renderEvents(tab, s.events, s.ts, true);
    else if (tab.rawEvents !== null) renderEvents(tab, tab.rawEvents, tab.fetchedAt, true);
    else showScreen('error');
  } finally {
    el('header-status').textContent = '';
    tab.isFetching = false;
    el('refresh-btn').classList.remove('spinning');
  }
}

function forceRefresh() { loadData(true); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      reg.installing.addEventListener('statechange', function() {
        if (this.state === 'activated') window.location.reload();
      });
    });
  }).catch(() => {});
}

loadData();
</script>
