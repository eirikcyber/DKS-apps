<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DKS Program – Asker</title>

  <!-- PWA meta tags for iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DKS Program">
  <meta name="theme-color" content="#005B8E">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="dks-icon.svg">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --blaa: #005B8E;
      --blaa-mork: #004068;
      --blaa-lys: #d6e8f3;
      --gronn: #4A7C59;
      --sand: #C8B89A;
      --sand-lys: #f5efe8;
      --terrakotta: #C0583A;
      --gul: #E8B84B;
      --svart: #1a1a1a;
      --graa: #6b6b6b;
      --graa-lys: #f0ede9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--sand-lys);
      color: var(--svart);
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    header {
      background: var(--blaa);
      color: white;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
    }

    .back-link {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
      padding: 4px 6px;
      margin-left: -6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .back-link:hover { color: white; background: rgba(255,255,255,0.1); }

    .header-title { flex: 1; }

    .header-title h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.2;
    }

    .header-title p {
      font-size: 12px;
      opacity: 0.65;
      font-weight: 300;
      margin-top: 2px;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
      color: white;
      font-size: 20px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.2); }
    .refresh-btn:active { background: rgba(255,255,255,0.28); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

    /* ── LASTE-INDIKATOR ── */
    #loading-overlay {
      display: none;
      padding: 72px 32px 48px;
      text-align: center;
    }
    #loading-overlay.vis { display: block; }

    .big-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--sand);
      border-top-color: var(--blaa);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    .loading-label {
      font-size: 15px;
      color: var(--svart);
      font-weight: 400;
      margin-bottom: 6px;
    }

    .loading-skule {
      font-size: 13px;
      color: var(--graa);
      min-height: 20px;
    }

    .prog-wrap {
      width: 220px;
      height: 4px;
      background: var(--sand);
      border-radius: 2px;
      margin: 14px auto 0;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: var(--blaa);
      border-radius: 2px;
      transition: width 0.25s ease;
    }

    /* ── FEILMELDING ── */
    #feil-melding {
      display: none;
      padding: 64px 32px;
      text-align: center;
    }
    #feil-melding.vis { display: block; }

    #feil-melding p {
      color: var(--graa);
      font-size: 15px;
      line-height: 1.65;
    }

    #feil-melding button {
      margin-top: 24px;
      padding: 11px 28px;
      background: var(--blaa);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    /* ── OFFLINE-BANNER ── */
    #offline-banner {
      display: none;
      background: #7a5c10;
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      font-weight: 300;
      padding: 9px 16px;
      text-align: center;
    }
    #offline-banner.vis { display: block; }

    /* ── DATO-INFO ── */
    .dato-info {
      padding: 10px 16px;
      font-size: 12.5px;
      color: var(--graa);
      background: white;
      border-bottom: 1px solid var(--graa-lys);
    }

    /* ── ARRANGEMENT ── */
    #events-container {
      display: none;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }
    #events-container.vis { display: block; }

    .dag-gruppe {
      animation: fadeIn 0.3s ease both;
    }

    .dag-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 20px 16px 8px;
      position: sticky;
      top: 0;
      background: var(--sand-lys);
      z-index: 5;
      border-bottom: 1px solid var(--sand);
    }

    .dag-namn {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blaa-mork);
    }

    .dag-tel {
      font-size: 11px;
      color: var(--graa);
      background: var(--graa-lys);
      padding: 2px 9px;
      border-radius: 10px;
    }

    .event-kort {
      background: white;
      margin: 10px 12px 0;
      border-radius: 10px;
      padding: 14px 16px 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      border-left: 3px solid var(--blaa);
    }

    .dag-gruppe:last-child .event-kort:last-child {
      margin-bottom: 0;
    }

    .ev-tid {
      font-size: 12px;
      font-weight: 600;
      color: var(--blaa);
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .ev-prod {
      font-size: 19px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--svart);
      margin-bottom: 10px;
    }

    .ev-meta {
      font-size: 14px;
      color: var(--graa);
      line-height: 1.9;
    }

    .ev-elevar {
      display: inline-block;
      margin-top: 8px;
      background: var(--blaa-lys);
      color: var(--blaa-mork);
      font-size: 13px;
      font-weight: 500;
      padding: 3px 12px;
      border-radius: 12px;
    }

    .tom-melding {
      padding: 72px 32px;
      text-align: center;
      font-size: 15px;
      color: var(--graa);
      line-height: 1.7;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="back-link" href="index.html" title="Tilbake til hovudsida">←</a>
    <div class="header-title">
      <h1>DKS Program</h1>
      <p>Asker-skular · neste 4 veker</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" title="Hent nye data" onclick="forceRefresh()">↻</button>
  </div>
</header>

<div id="offline-banner">
  Viser bufra data – sist oppdatert <span id="cache-age-txt"></span>
</div>

<div id="loading-overlay">
  <div class="big-spinner"></div>
  <p class="loading-label" id="loading-label">Hentar arrangement for alle Asker-skular…</p>
  <p class="loading-skule" id="loading-skule"></p>
  <div class="prog-wrap">
    <div class="prog-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<div id="feil-melding">
  <p id="feil-tekst">Klarte ikkje hente data. Sjekk at du er tilkopla internett og prøv igjen.</p>
  <button onclick="forceRefresh()">Prøv igjen</button>
</div>

<div id="dato-info-wrap"></div>
<div id="events-container"></div>

<script>
const API      = 'https://portal.denkulturelleskolesekken.no/public/events/findBySchool?orgNumber=';
const CACHE_KEY = 'dks_program_v1';
const MAX_AGE   = 4 * 60 * 60 * 1000; // 4 timar

const SKULAR = [
  {name: 'Arnestad skole',            org: '973601997'},
  {name: 'Billingstad skole',          org: '974578263'},
  {name: 'Blakstad skole',             org: '979200293'},
  {name: 'Bondi skole',                org: '974578212'},
  {name: 'Drengsrud skole',            org: '974578220'},
  {name: 'Folkestad skole',            org: '975285103'},
  {name: 'Frydenlund barneskole',      org: '973747010'},
  {name: 'Hagaløkka skole',            org: '974578239'},
  {name: 'Heggedal skole',             org: '974578247'},
  {name: 'Hofstad skole',              org: '974578255'},
  {name: 'Hvalstad skole',             org: '980785343'},
  {name: 'Hyggen skole',               org: '973747045'},
  {name: 'Jansløkka skole',            org: '974578271'},
  {name: 'Mellom-Nes skole',           org: '874578282'},
  {name: 'Midtbygda barneskole',       org: '973747002'},
  {name: 'Nesøya skole',               org: '974578298'},
  {name: 'Nærsnes barneskole',         org: '973747029'},
  {name: 'Rønningen skole',            org: '974578301'},
  {name: 'Slemmestad barneskole',      org: '973747037'},
  {name: 'Solberg skole',              org: '874578312'},
  {name: 'Steinerskolen i Asker',      org: '971522585'},
  {name: 'Steinerskolen i Hurum',      org: '974185385'},
  {name: 'Asker International School', org: '998258383'},
  {name: 'Vollen Montessoriskole',     org: '984666675'},
  {name: 'Sydskogen barneskole',       org: '973746987'},
  {name: 'Sætre skole',                org: '975285111'},
  {name: 'Tofte skole',                org: '875285092'},
  {name: 'Torvbråten barneskole',      org: '973746995'},
  {name: 'Vardåsen skole',             org: '977264502'},
  {name: 'Vettre skole',               org: '974578328'},
];

// ── Hjelpefunksjonar ──────────────────────────────────────────────

function el(id) { return document.getElementById(id); }

function strVal(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (typeof v === 'object') return v.name || v.title || '';
  return String(v);
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtTime(dateStartSec) {
  const d = new Date(dateStartSec * 1000);
  return d.toLocaleTimeString('nb-NO', {hour: '2-digit', minute: '2-digit'});
}

function fmtDateHeader(d) {
  const s = d.toLocaleDateString('nb-NO', {weekday: 'long', day: 'numeric', month: 'long'});
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function fmtRelative(ts) {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1)  return 'akkurat no';
  if (mins < 60) return `${mins} min sidan`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs} t sidan`;
  return `${Math.floor(hrs / 24)} dag${Math.floor(hrs/24) > 1 ? 'ar' : ''} sidan`;
}

// ── Cache ──────────────────────────────────────────────────────────

function saveCache(events) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), events}));
  } catch(_) {}
}

function loadCache(allowStale = false) {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!allowStale && Date.now() - data.ts > MAX_AGE) return null;
    return data;
  } catch(_) { return null; }
}

// ── Filtrering og gruppering ───────────────────────────────────────

function filterEvents(events) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const end = new Date(today);
  end.setDate(end.getDate() + 28);
  const fromTs = today.getTime() / 1000;
  const toTs   = end.getTime() / 1000;

  return events
    .filter(ev => {
      const ts = Number(ev.dateStart);
      if (isNaN(ts) || ts < fromTs || ts >= toTs) return false;
      if ((ev.status || '').includes('cancel')) return false;
      return true;
    })
    .sort((a, b) => a.dateStart - b.dateStart);
}

function groupByDate(events) {
  const groups = new Map();
  for (const ev of events) {
    const d = new Date(ev.dateStart * 1000);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups.has(key)) groups.set(key, {date: d, events: []});
    groups.get(key).events.push(ev);
  }
  return [...groups.values()];
}

// ── Rendering ─────────────────────────────────────────────────────

function renderCard(ev) {
  const tid    = fmtTime(ev.dateStart);
  const prod   = escHtml(strVal(ev.production) || strVal(ev.tour) || '–');
  const lok    = strVal(ev.location);
  const skular = (ev._schools || []).join(', ') || '–';
  const elevar = ev.numberOfStudents > 0 ? ev.numberOfStudents : null;

  return `<div class="event-kort">
    <div class="ev-tid">${escHtml(tid)}</div>
    <div class="ev-prod">${prod}</div>
    ${lok ? `<div class="ev-meta">📍 ${escHtml(lok)}</div>` : ''}
    <div class="ev-meta">🏫 ${escHtml(skular)}</div>
    ${elevar !== null ? `<span class="ev-elevar">👥 ${elevar} elevar</span>` : ''}
  </div>`;
}

function renderGroups(groups) {
  if (!groups.length) {
    return '<div class="tom-melding">Ingen planlagde arrangement dei neste 4 vekene.</div>';
  }
  return groups.map(({date, events}, i) =>
    `<div class="dag-gruppe" style="animation-delay:${Math.min(i * 0.06, 0.5)}s">
      <div class="dag-header">
        <span class="dag-namn">${escHtml(fmtDateHeader(date))}</span>
        <span class="dag-tel">${events.length} arr.</span>
      </div>
      ${events.map(renderCard).join('')}
    </div>`
  ).join('');
}

function showScreen(which) {
  el('loading-overlay').className  = which === 'loading' ? 'vis' : '';
  el('feil-melding').className     = which === 'error'   ? 'vis' : '';
  el('events-container').className = which === 'events'  ? 'vis' : '';
  el('dato-info-wrap').style.display = which === 'events' ? '' : 'none';
}

function renderEvents(events, fetchedAt, isStale = false) {
  const filtered = filterEvents(events);
  const groups   = groupByDate(filtered);

  el('events-container').innerHTML = renderGroups(groups);

  const today = new Date(); today.setHours(0,0,0,0);
  const end   = new Date(today); end.setDate(end.getDate() + 28);
  const fraDato = today.toLocaleDateString('nb-NO', {day: 'numeric', month: 'long'});
  const tilDato = end.toLocaleDateString('nb-NO',   {day: 'numeric', month: 'long'});

  el('dato-info-wrap').innerHTML =
    `<div class="dato-info">${fraDato} – ${tilDato} · ${filtered.length} arrangement · oppdatert ${fmtRelative(fetchedAt)}</div>`;

  if (isStale) {
    el('offline-banner').classList.add('vis');
    el('cache-age-txt').textContent = fmtRelative(fetchedAt);
  } else {
    el('offline-banner').classList.remove('vis');
  }

  showScreen('events');
}

// ── API-henting ───────────────────────────────────────────────────

function updateProgress(i, total, skuleName) {
  el('loading-label').textContent = `Hentar arrangement (${i+1}/${total})…`;
  el('loading-skule').textContent = skuleName;
  el('prog-fill').style.width = Math.round((i / total) * 100) + '%';
}

async function fetchAllEvents() {
  const eventMap = {};
  const total    = SKULAR.length;

  for (let i = 0; i < total; i++) {
    const {name, org} = SKULAR[i];
    updateProgress(i, total, name);
    try {
      const r = await fetch(API + org);
      if (!r.ok) continue;
      const evs = await r.json();
      if (!Array.isArray(evs)) continue;
      for (const ev of evs) {
        if (!ev.id) continue;
        if (!eventMap[ev.id]) eventMap[ev.id] = {...ev, _schools: []};
        if (!eventMap[ev.id]._schools.includes(name))
          eventMap[ev.id]._schools.push(name);
      }
    } catch(_) {}
  }

  return Object.values(eventMap);
}

// ── Hovudflyt ─────────────────────────────────────────────────────

let isFetching = false;

async function loadData(force = false) {
  if (isFetching) return;

  if (!force) {
    const cached = loadCache();
    if (cached) { renderEvents(cached.events, cached.ts); return; }
  }

  isFetching = true;
  showScreen('loading');
  el('refresh-btn').classList.add('spinning');

  try {
    const events = await fetchAllEvents();
    saveCache(events);
    renderEvents(events, Date.now());
  } catch(err) {
    const stale = loadCache(true);
    if (stale) {
      renderEvents(stale.events, stale.ts, true);
    } else {
      el('feil-tekst').textContent =
        'Klarte ikkje hente data. Sjekk at du er tilkopla internett og prøv igjen.';
      showScreen('error');
    }
  } finally {
    isFetching = false;
    el('refresh-btn').classList.remove('spinning');
  }
}

function forceRefresh() { loadData(true); }

// ── Service Worker ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Start ─────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
