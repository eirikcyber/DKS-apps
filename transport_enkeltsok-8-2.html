<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKS Transport - Enkeltsøk</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD_AfzzIMq0Jot-Jzkm1GjvaGTmQGqg8Q0&libraries=places"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
        }
        
        h1 {
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }
        
        /* Steg-seksjonar */
        .steg {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        
        .steg-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .steg-nummer {
            background: #667eea;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .steg-tittel {
            font-weight: 600;
            font-size: 16px;
        }
        
        .steg.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .steg.completed .steg-nummer {
            background: #10b981;
        }
        
        /* Input-felt */
        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .input-group label {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input,
        .input-group select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Klassar */
        .klassar-liste {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .klasse-boks {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f0f4ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .klasse-boks:hover {
            background: #e0e7ff;
        }
        
        .klasse-boks.fjerna {
            background: #f3f4f6;
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .klasse-boks input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .elevar-sum {
            margin-top: 10px;
            font-weight: 500;
            color: #667eea;
        }
        
        /* Søk-knapp */
        .sok-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .sok-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .sok-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Resultat-kort */
        .resultat-kort {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .resultat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .resultat-header:hover {
            background: #f9fafb;
        }
        
        .resultat-skule {
            font-weight: 600;
            font-size: 15px;
        }
        
        .resultat-oppsummering {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #666;
            font-size: 14px;
        }
        
        .resultat-beste {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #10b981;
            font-weight: 500;
        }
        
        .utvid-pil {
            font-size: 12px;
            transition: transform 0.3s;
            color: #999;
        }
        
        .resultat-kort.utvida .utvid-pil {
            transform: rotate(180deg);
        }
        
        .resultat-detaljar {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid #eee;
        }
        
        .resultat-kort.utvida .resultat-detaljar {
            display: block;
        }
        
        /* Transport-alternativ */
        .transport-alternativ {
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            background: #f9fafb;
        }
        
        .transport-alternativ.beste {
            background: #ecfdf5;
            border: 2px solid #10b981;
        }
        
        .transport-alternativ.uaktuelt {
            opacity: 0.5;
        }
        
        .transport-type {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .transport-ikon {
            font-size: 20px;
        }
        
        .transport-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .badge-beste {
            background: #10b981;
            color: white;
        }
        
        .badge-uaktuelt {
            background: #ef4444;
            color: white;
        }
        
        .transport-tider {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .transport-tider span {
            color: #666;
        }
        
        .transport-tider strong {
            color: #333;
        }
        
        .reiseveg {
            font-size: 13px;
            color: #666;
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
        }
        
        .reiseveg-steg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        
        .reiseveg-pil {
            color: #ccc;
        }
        
        /* Ekstra avgangar (alternative bussavgangar) */
        .ekstra-avgangar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding: 8px 10px;
            background: #f0f4ff;
            border-radius: 6px;
        }
        
        .ekstra-label {
            font-size: 12px;
            color: #666;
        }
        
        .ekstra-avgang {
            font-size: 12px;
            padding: 4px 8px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: help;
        }
        
        .ekstra-avgang:hover {
            background: #e0e7ff;
            border-color: #667eea;
        }
        
        /* Klassar-info i resultat */
        .klassar-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        /* Overstyring-knappar */
        .overstyring-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #f0f4ff;
            border-radius: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .overstyring-label {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }
        
        .overstyring-knappar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .overstyr-btn {
            padding: 6px 12px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .overstyr-btn:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }
        
        .overstyr-btn.auto {
            border-color: #9ca3af;
            background: #f3f4f6;
        }
        
        .overstyr-btn.låst {
            border-color: #10b981;
            background: #10b981;
            color: white;
        }
        
        .overstyr-reset {
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: white;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }
        
        .overstyr-reset:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        
        .låst-info {
            font-size: 12px;
            color: #10b981;
            font-weight: 500;
        }
        
        .ulåst-info {
            font-size: 12px;
            color: #6b7280;
        }
        
        /* Status-melding */
        .status {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.info {
            background: #e0f2fe;
            color: #0369a1;
        }
        
        .status.success {
            background: #dcfce7;
            color: #166534;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Navigasjon-knappar */
        .nav-knappar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .nav-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn.primary {
            background: #667eea;
            color: white;
            border: none;
        }
        
        .nav-btn.primary:hover {
            background: #5a67d8;
        }
        
        .nav-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .nav-btn.secondary:hover {
            background: #f0f4ff;
        }
        
        /* Resultat-seksjon */
        #resultatSeksjon {
            margin-top: 20px;
        }
        
        .resultat-tittel {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ========== FORDELING-SEKSJON ========== */
        .fordeling-boks {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .fordeling-boks h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #333;
        }
        
        .oppsummering-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        
        .oppsummering-kort {
            background: white;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        
        .oppsummering-kort .tal {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .oppsummering-kort .label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .kategori-liste {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        
        .kategori-rad {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .kategori-rad .ikon {
            margin-right: 8px;
        }
        
        .kategori-rad .tal {
            font-weight: 600;
            color: #667eea;
        }
        
        /* Arrangement-liste */
        .arrangement-kort {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .arrangement-kort .info {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .arrangement-kort .dato {
            font-weight: 600;
            color: #333;
        }
        
        .arrangement-kort .detaljar {
            color: #666;
            font-size: 14px;
        }
        
        .arrangement-kort .fjern-btn {
            background: #fee2e2;
            color: #991b1b;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .arrangement-kort .fjern-btn:hover {
            background: #fecaca;
        }
        
        /* Konflikt-varsling */
        .konflikt-boks {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }
        
        .konflikt-boks h4 {
            color: #92400e;
            margin: 0 0 8px 0;
            font-size: 14px;
        }
        
        .konflikt-boks ul {
            margin: 0;
            padding-left: 20px;
            color: #92400e;
            font-size: 13px;
        }
        
        /* Fordelingsvisning */
        .visning-kort {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .visning-header {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .visning-header .kapasitet {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .visning-innhald {
            padding: 15px;
        }
        
        .plassering-rad {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        
        .plassering-rad:last-child {
            border-bottom: none;
        }
        
        .plassering-rad .skule-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .plassering-rad .transport-info {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .plassering-rad .tid-info {
            background: #e0f2fe;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .plassering-rad .varigheit-info {
            background: #f3f4f6;
            color: #666;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .plassering-rad .låst-badge {
            font-size: 10px;
        }
        
        .plassering-rad.låst {
            background: #ecfdf5;
            border-left: 3px solid #10b981;
        }
        
        /* Skule-velgar */
        .skule-velgar-liste {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        
        .skule-velgar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: #f9fafb;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .skule-velgar-item:hover {
            background: #f0f4ff;
        }
        
        .skule-velgar-item.valt {
            background: #667eea;
            color: white;
        }
        
        .skule-velgar-item input[type="checkbox"] {
            accent-color: #667eea;
        }
        
        /* Resultat-wrapper med sidebar */
        .resultat-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .resultat-hovud {
            flex: 1;
            min-width: 0;
        }
        
        /* Låste skular sidebar */
        .låste-sidebar {
            width: 500px;
            flex-shrink: 0;
            background: #f0fdf4;
            border: 2px solid #10b981;
            border-radius: 10px;
            padding: 12px;
            position: sticky;
            top: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #10b981;
        }
        
        .sidebar-header h3 {
            margin: 0;
            font-size: 15px;
            color: #166534;
        }
        
        .sidebar-header span {
            font-size: 12px;
            color: #16a34a;
            background: white;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .låste-liste {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .låst-kort {
            background: white;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            border-left: 3px solid #10b981;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        
        .låst-kort .kort-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        
        .låst-kort .skule-namn {
            font-weight: 600;
            color: #1f2937;
        }
        
        .låst-kort .transport-type {
            color: #666;
            font-size: 12px;
        }
        
        .låst-kort .lås-opp-btn {
            font-size: 12px;
            color: #dc2626;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
            flex-shrink: 0;
        }
        
        .låst-kort .lås-opp-btn:hover {
            background: #fee2e2;
            border-radius: 4px;
        }
        
        .låst-kort .lås-opp-btn:hover {
            text-decoration: underline;
        }
        
        .sidebar-actions {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #10b981;
        }
        
        /* Retur-info i resultat */
        .retur-seksjon {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px dashed #e5e7eb;
        }
        
        .retur-header {
            font-size: 13px;
            font-weight: 600;
            color: #7c3aed;
            margin-bottom: 8px;
        }
        
        .transport-alternativ.retur {
            background: #faf5ff;
            border-left: 3px solid #7c3aed;
        }
        
        .transport-alternativ.retur.beste {
            background: #f3e8ff;
        }
        
        .plassering-rad .elevar {
            font-weight: 600;
            color: #667eea;
            min-width: 60px;
            text-align: right;
        }
        
        .plassering-rad.rutebuss {
            background: #fef3c7;
        }
        
        .visning-sum {
            background: #f0f4ff;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            border-top: 2px solid #667eea;
        }
        
        .visning-sum.full {
            background: #dcfce7;
        }
        
        .visning-sum.overfylt {
            background: #fee2e2;
            color: #991b1b;
        }
        /* ===== TURNÉ-MODUS ===== */
        .modus-btn {
            padding: 10px 22px;
            border: none;
            background: white;
            color: #667eea;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .modus-btn.aktiv {
            background: #667eea;
            color: white;
        }
        .modus-btn:hover:not(.aktiv) {
            background: #f0f4ff;
        }
        .turne-resultat-gruppe {
            margin-bottom: 25px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .turne-resultat-gruppe-header {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            font-weight: 600;
            font-size: 15px;
        }
        .turne-skule-rad {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #f3f4f6;
            background: white;
            gap: 10px;
            flex-wrap: wrap;
        }
        .turne-skule-rad:last-child { border-bottom: none; }
        .turne-skule-namn { font-weight: 600; min-width: 200px; flex: 1; }
        .turne-detaljar { font-size: 13px; color: #555; flex: 2; min-width: 150px; }
        .turne-alternativ-knappar { display: flex; gap: 6px; flex-wrap: wrap; }
        .turne-alt-wrapper { position: relative; display: inline-block; }
        .turne-alternativ-knappar button {
            padding: 4px 10px;
            font-size: 12px;

// Prøv direkte → corsproxy.io → allorigins.win (fallback ved brannmur)
async function corsHent(url) {
    const proxyer = [
        url,
        'https://corsproxy.io/?' + encodeURIComponent(url),
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
    ];
    let sisteErr;
    for (const forsøkUrl of proxyer) {
        try {
            const resp = await fetch(forsøkUrl);
            if (resp.ok) return resp;
            sisteErr = new Error(`HTTP ${resp.status} frå ${forsøkUrl}`);
        } catch (e) {
            sisteErr = e;
        }
    }
    throw sisteErr || new Error('Alle proxyer feila');
}

// Formater dato til DD/MM/YYYY
function formaterDato(datoStr) {
    const dato = new Date(datoStr);
    const dag = String(dato.getDate()).padStart(2, '0');
    const mnd = String(dato.getMonth() + 1).padStart(2, '0');
    const år = dato.getFullYear();
    return `${dag}/${mnd}/${år}`;
}

async function geocodeAddress(address) {

    const lower = address.toLowerCase().trim();

        if (lower.includes(key)) {
            return coords;
        }
    }
    
    // Prøv Entur geocoder
    try {
        const url = `https://api.entur.io/geocoder/v1/autocomplete?text=${encodeURIComponent(address)}&size=1`;
        const response = await corsHent(url);
        const data = await response.json();
        
        if (data.features?.length > 0) {
            const coords = data.features[0].geometry.coordinates;
            return { lat: coords[1], lon: coords[0] };
        }
    } catch (e) {
        console.error('Geocoding feil:', e);
    }
    
    return null;
}

// ========== ENTUR REISESØK ==========
async function finnReise(from, to, arriveBy, mode) {
    const url = 'https://api.entur.io/journey-planner/v3/graphql';
    
    let modesConfig = '';
    if (mode === 'foot') {
        modesConfig = `modes: { directMode: foot, accessMode: foot, egressMode: foot, transportModes: [] }`;
    } else if (mode === 'bus') {
        modesConfig = `modes: { accessMode: foot, egressMode: foot, transportModes: [{transportMode: bus}, {transportMode: coach}] }`;
    } else if (mode === 'rail') {
        modesConfig = `modes: { accessMode: foot, egressMode: foot, transportModes: [{transportMode: rail}] }`;
    }
    
    const query = `{
        trip(
            from: {coordinates: {latitude: ${from.lat}, longitude: ${from.lon}}}
            to: {coordinates: {latitude: ${to.lat}, longitude: ${to.lon}}}
            dateTime: "${arriveBy}"
            arriveBy: true
            numTripPatterns: 6
            ${modesConfig}
        ) {
            tripPatterns {
                startTime
                endTime
                duration
                walkDistance
                legs {
                    mode
                    duration
                    distance
                    fromPlace { name }
                    toPlace { name }
                    line { publicCode name }
                }
            }
        }
    }`;
    
    console.log(`Entur søk (${mode}):`, { from, to, arriveBy });
    
    // Prøv direkte først, så med proxy
    const attempts = [
        { 
            url: url, 
            options: {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ET-Client-Name': 'asker-dks-transport'
                },
                body: JSON.stringify({ query })
            }
        },
        {
            url: CORS_PROXY + encodeURIComponent(url),
            options: {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            }
        }
    ];
    
    for (const attempt of attempts) {
        try {
            const response = await fetch(attempt.url, attempt.options);
            
            if (!response.ok) {
                console.warn(`Entur response ikkje OK (${mode}):`, response.status);
                continue;
            }
            
            const data = await response.json();
            console.log(`Entur resultat (${mode}):`, data);
            
            if (data.errors) {
                console.error(`Entur feil (${mode}):`, data.errors);
                continue;
            }
            
            const tripPatterns = data.data?.trip?.tripPatterns;
            if (tripPatterns && tripPatterns.length > 0) {
                console.log(`Fann ${tripPatterns.length} reiser (${mode}):`, tripPatterns);
                return tripPatterns; // Returner ALLE, ikkje berre første
            } else {
                console.log(`Ingen reise funne (${mode})`);
            }
            
            // Viss vi kom hit utan feil, men ingen resultat, returner null
            return null;
            
        } catch (e) {
            console.warn(`Entur feil (${mode}, ${attempt.url.includes('corsproxy') ? 'proxy' : 'direkte'}):`, e.message);
        }
    }
    
    console.error(`Alle Entur-forsøk feila (${mode})`);
    return null;
}

// ========== BEREKN GANGAVSTAND (fallback) ==========
function beregnAvstandLuftlinje(from, to) {
    const R = 6371000; // meter
    const dLat = (to.lat - from.lat) * Math.PI / 180;
    const dLon = (to.lon - from.lon) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(from.lat * Math.PI / 180) * Math.cos(to.lat * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return Math.round(R * c);
}

// ========== GOOGLE MAPS DISTANCE MATRIX (med caching) ==========
function hentGoogleAvstand(from, to, mode) {
    return new Promise((resolve) => {
        // Lag cache-nøkkel
        const cacheKey = `gmap_${mode}_${from.lat.toFixed(3)}_${from.lon.toFixed(3)}_${to.lat.toFixed(3)}_${to.lon.toFixed(3)}`;

        // Sjekk statisk tabell fyrst (ingen API-kall nødvendig)
        if (STATISK_AVSTAND[cacheKey]) {
            resolve(STATISK_AVSTAND[cacheKey]);
            return;
        }

        // Sjekk localStorage-cache
        try {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                resolve(JSON.parse(cached));
                return;
            }
        } catch (e) {}
        
        // Timeout etter 5 sekund
        const timeout = setTimeout(() => {
            console.warn('Google Maps timeout, brukar fallback');
            const luftlinje = beregnAvstandLuftlinje(from, to);
            if (mode === 'DRIVING') {
                // 60 km/h snitt (1000 m/min) med veifaktor 1.4
                resolve({ avstand: luftlinje * 1.4, tid: Math.round((luftlinje * 1.4) / 1000) + 5 });
            } else {
                resolve({ avstand: luftlinje * 1.2, tid: Math.round((luftlinje * 1.2) / 80) });
            }
        }, 5000);

        if (typeof google === 'undefined' || !google.maps) {
            clearTimeout(timeout);
            const luftlinje = beregnAvstandLuftlinje(from, to);
            if (mode === 'DRIVING') {
                // 60 km/h snitt (1000 m/min) med veifaktor 1.4
                resolve({ avstand: luftlinje * 1.4, tid: Math.round((luftlinje * 1.4) / 1000) + 5 });
            } else {
                resolve({ avstand: luftlinje * 1.2, tid: Math.round((luftlinje * 1.2) / 80) });
            }
            return;
        }
        
        try {
            const service = new google.maps.DistanceMatrixService();
            
            service.getDistanceMatrix({
                origins: [new google.maps.LatLng(from.lat, from.lon)],
                destinations: [new google.maps.LatLng(to.lat, to.lon)],
                travelMode: google.maps.TravelMode[mode],
                unitSystem: google.maps.UnitSystem.METRIC
            }, (response, status) => {
                clearTimeout(timeout);
                
                if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
                    const element = response.rows[0].elements[0];
                    const resultat = {
                        avstand: element.distance.value, // meter
                        tid: Math.round(element.duration.value / 60), // minutt
                        avstandTekst: element.distance.text,
                        tidTekst: element.duration.text
                    };
                    
                    // Lagre i cache
                    try {
                        localStorage.setItem(cacheKey, JSON.stringify(resultat));
                    } catch (e) {}
                    
                    resolve(resultat);
                } else {
                    console.warn('Google Maps feil:', status);
                    const luftlinje = beregnAvstandLuftlinje(from, to);
                    if (mode === 'DRIVING') {
                        resolve({ avstand: luftlinje * 1.3, tid: Math.round((luftlinje * 1.3) / 500) + 5 });
                    } else {
                        resolve({ avstand: luftlinje * 1.2, tid: Math.round((luftlinje * 1.2) / 80) });
                    }
                }
            });
        } catch (e) {
            clearTimeout(timeout);
            console.error('Google Maps exception:', e);
            const luftlinje = beregnAvstandLuftlinje(from, to);
            if (mode === 'DRIVING') {
                resolve({ avstand: luftlinje * 1.3, tid: Math.round((luftlinje * 1.3) / 500) + 5 });
            } else {
                resolve({ avstand: luftlinje * 1.2, tid: Math.round((luftlinje * 1.2) / 80) });
            }
        }
    });
}

// ========== START SØK ==========
async function startSok() {
    const destinasjon = document.getElementById('destinasjon').value.trim();
    const maksGange = parseInt(document.getElementById('maksGange').value) || 2000;
    const dato = document.getElementById('dato').value;
    const tid = document.getElementById('ankomsttid').value;
    
    if (!destinasjon) {
        visStatus('Skriv inn destinasjon', 'error');
        return;
    }
    
    if (!valtSkule) {
        visStatus('Vel ein skule', 'error');
        return;
    }
    
    const sokBtn = document.getElementById('sokBtn');
    sokBtn.disabled = true;
    sokBtn.innerHTML = '<span class="spinner"></span>Søker...';
    
    // Geocode destinasjon om ikkje allereie gjort
    if (!destCoords) {
        visStatus('Finn destinasjon...', 'info');
        destCoords = await geocodeAddress(destinasjon);
        if (!destCoords) {
            visStatus('Kunne ikkje finne destinasjon', 'error');
            sokBtn.disabled = false;
            sokBtn.textContent = 'Søk transport';
            return;
        }
    }
    
    // Hent skulekoordinatar
    const skuleCoords = skuleKoordinatar[valtSkule];
    if (!skuleCoords) {
        visStatus('Manglar koordinatar for skulen', 'error');
        sokBtn.disabled = false;
        sokBtn.textContent = 'Søk transport';
        return;
    }
    
    // Bygg arriveBy tidspunkt
    const arriveBy = `${dato}T${tid}:00`;
    
    visStatus('Søker transportalternativ...', 'info');
    
    // Hent valgte klassar og elevtal
    const trinnData = elevtalData.skular[valtSkule].trinn[valtTrinn];
    let elevarMed = 0;
    const klassarMed = [];
    for (const [klasseNamn, elevar] of Object.entries(trinnData.klassar)) {
        if (valgteKlassar[klasseNamn]) {
            elevarMed += elevar;
            klassarMed.push({ namn: klasseNamn, elevar: elevar });
        }
    }
    
    // Søk parallelt - inkludert Google Maps for gange og køyring
    const [gangeReiser, bussReiser, togReiser, googleGange, googleKøyring] = await Promise.all([
        finnReise(skuleCoords, destCoords, arriveBy, 'foot'),
        finnReise(skuleCoords, destCoords, arriveBy, 'bus'),
        finnReise(skuleCoords, destCoords, arriveBy, 'rail'),
        hentGoogleAvstand(skuleCoords, destCoords, 'WALKING'),
        hentGoogleAvstand(skuleCoords, destCoords, 'DRIVING')
    ]);
    
    // Hjelpefunksjon: finn direkterute (berre 1 kollektiv-leg)
    function finnDirektereise(reiser, mode) {
        if (!reiser || reiser.length === 0) return null;
        // Sorter etter antal kollektiv-legs, så etter tid
        const sortert = [...reiser].sort((a, b) => {
            const legsA = telKollektivLegs(a.legs);
            const legsB = telKollektivLegs(b.legs);
            if (legsA !== legsB) return legsA - legsB; // Færrast legs først
            return a.duration - b.duration; // Så raskast
        });
        return sortert[0];
    }
    
    // Bygg resultat
    const skuleResultat = {
        skule: valtSkule,
        trinn: valtTrinn,
        klassar: klassarMed,
        elevar: elevarMed,
        dato: dato,
        tid: tid,
        alternativ: []
    };
    
    // Gange - bruk Google Maps data
    const gangeReise = gangeReiser?.[0];
    const gangeAlt = {
        type: 'gange',
        ikon: '🚶',
        namn: 'Gange',
        avstand: googleGange.avstand,
        varigheit: googleGange.tid,
        aktuelt: googleGange.avstand <= maksGange,
        reiseveg: [`Gå ${googleGange.avstandTekst || ((googleGange.avstand/1000).toFixed(1) + ' km')} frå ${valtSkule} til destinasjon (${googleGange.tidTekst || googleGange.tid + ' min'})`]
    };
    if (gangeReise) {
        gangeAlt.avgang = gangeReise.startTime;
        gangeAlt.ankomst = gangeReise.endTime;
    }
    skuleResultat.alternativ.push(gangeAlt);
    
    // Buss - vis fleire avgangar (prioriter direkteruter)
    if (bussReiser && bussReiser.length > 0) {
        // Sorter: direkteruter først, så etter tid
        const sorterteBussar = [...bussReiser].sort((a, b) => {
            const legsA = telKollektivLegs(a.legs);
            const legsB = telKollektivLegs(b.legs);
            if (legsA !== legsB) return legsA - legsB;
            return a.duration - b.duration;
        });
        
        // Hovudalternativ
        const bussReise = sorterteBussar[0];
        const kollektivLegs = telKollektivLegs(bussReise.legs);
        const erDirekte = kollektivLegs === 1;
        
        const bussAlt = {
            type: 'buss',
            ikon: '🚌',
            namn: erDirekte ? 'Direktebuss' : 'Rutebuss',
            avgang: bussReise.startTime,
            ankomst: bussReise.endTime,
            varigheit: Math.round(bussReise.duration / 60),
            aktuelt: true,
            bytter: kollektivLegs - 1,
            reiseveg: byggReiseveg(bussReise.legs),
            ekstraAvgangar: []
        };
        // Finn linje(r)
        const bussLegs = bussReise.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
        if (bussLegs.length > 0) {
            bussAlt.linje = bussLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
            bussAlt.linjeNamn = bussLegs[0].line?.name || '';
        }
        
        // Legg til ekstra avgangar (alternativ 2 og 3)
        for (let i = 1; i < Math.min(3, sorterteBussar.length); i++) {
            const ekstraBuss = sorterteBussar[i];
            const ekstraLegs = ekstraBuss.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
            bussAlt.ekstraAvgangar.push({
                avgang: ekstraBuss.startTime,
                ankomst: ekstraBuss.endTime,
                varigheit: Math.round(ekstraBuss.duration / 60),
                linje: ekstraLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → '),
                bytter: telKollektivLegs(ekstraBuss.legs) - 1,
                reiseveg: byggReiseveg(ekstraBuss.legs)
            });
        }
        
        skuleResultat.alternativ.push(bussAlt);
    }
    
    // Tog - finn beste (prioriter direkterute)
    if (togReiser && togReiser.length > 0) {
        const togReise = finnDirektereise(togReiser, 'rail');
        const kollektivLegs = telKollektivLegs(togReise.legs);
        const erDirekte = kollektivLegs === 1;
        
        const togAlt = {
            type: 'tog',
            ikon: '🚂',
            namn: erDirekte ? 'Direktetog' : 'Tog',
            avgang: togReise.startTime,
            ankomst: togReise.endTime,
            varigheit: Math.round(togReise.duration / 60),
            aktuelt: true,
            bytter: kollektivLegs - 1,
            reiseveg: byggReiseveg(togReise.legs)
        };
        // Finn linje(r)
        const togLegs = togReise.legs.filter(l => l.mode === 'rail');
        if (togLegs.length > 0) {
            togAlt.linje = togLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
            togAlt.linjeNamn = togLegs[0].line?.name || '';
        }
        skuleResultat.alternativ.push(togAlt);
    }
    
    // Bestillerbuss - bruk Google Maps køyretid
    const bestillerbussAlt = {
        type: 'bestillerbuss',
        ikon: '🚐',
        namn: 'Bestillerbuss',
        avstand: googleKøyring.avstand,
        varigheit: googleKøyring.tid,
        aktuelt: true,
        reiseveg: [`Bestillerbuss frå ${valtSkule} til destinasjon - ${googleKøyring.avstandTekst || ((googleKøyring.avstand/1000).toFixed(1) + ' km')} (${googleKøyring.tidTekst || googleKøyring.tid + ' min'})`]
    };
    skuleResultat.alternativ.push(bestillerbussAlt);
    
    // Finn beste alternativ
    // Prioritet: 1. Gange (viss under maks), 2. Tog (direktetog), 3. Direktebuss, 4. Bestillerbuss
    // ALDRI vel rutebuss med bytte automatisk
    const aktuelle = skuleResultat.alternativ.filter(a => a.aktuelt);
    const bestillerbussTid = bestillerbussAlt.varigheit;
    
    // Finn gange, direktetog og direktebuss
    const gangeAltFunne = aktuelle.find(a => a.type === 'gange' && a.aktuelt);
    const togAltFunne = aktuelle.find(a => a.type === 'tog' && (a.bytter === 0 || a.bytter === undefined));
    const direktebussAltFunne = aktuelle.find(a => a.type === 'buss' && (a.bytter === 0 || a.bytter === undefined));
    
    // Prioritert rekkefølge (ALDRI rutebuss med bytte)
    let valtAlternativ = null;
    
    // 1. Gange viss under maks avstand
    if (gangeAltFunne && gangeAltFunne.aktuelt) {
        valtAlternativ = gangeAltFunne;
    }
    // 2. Direktetog (prioritert over rutebuss)
    else if (togAltFunne) {
        valtAlternativ = togAltFunne;
    }
    // 3. Direktebuss (utan bytte)
    else if (direktebussAltFunne) {
        valtAlternativ = direktebussAltFunne;
    }
    // 4. Ingen kollektiv utan bytte - bruk bestillerbuss
    // (rutebuss med bytte blir ALDRI valt automatisk)
    
    // Sjekk om bestillerbuss er 30+ min raskare enn valt alternativ
    if (valtAlternativ) {
        if (bestillerbussTid + 30 < valtAlternativ.varigheit) {
            bestillerbussAlt.beste = true;
        } else {
            valtAlternativ.beste = true;
        }
    } else {
        // Ingen direkterute - bruk bestillerbuss
        bestillerbussAlt.beste = true;
    }
    
    // Legg til resultat
    resultat.push(skuleResultat);
    
    // Vis resultat
    visResultat();
    
    visStatus('Ferdig!', 'success');
    sokBtn.disabled = false;
    sokBtn.textContent = 'Søk transport';
    
    // Vis navigasjonsknappar
    document.getElementById('navKnappar').style.display = 'flex';
    document.getElementById('resultatTittel').style.display = 'block';
}

// ========== BYGG REISEVEG-TEKST ==========
function byggReiseveg(legs) {
    if (!legs) return [];
    
    const steg = [];
    for (const leg of legs) {
        let tekst = '';
        if (leg.mode === 'foot') {
            const min = Math.round(leg.duration / 60);
            tekst = `Gå ${min} min`;
            if (leg.toPlace?.name) tekst += ` til ${leg.toPlace.name}`;
        } else if (leg.mode === 'bus' || leg.mode === 'coach') {
            const linje = leg.line?.publicCode || 'buss';
            tekst = `Buss ${linje}`;
            if (leg.fromPlace?.name) tekst += ` frå ${leg.fromPlace.name}`;
        } else if (leg.mode === 'rail') {
            const linje = leg.line?.publicCode || 'tog';
            tekst = `Tog ${linje}`;
            if (leg.fromPlace?.name) tekst += ` frå ${leg.fromPlace.name}`;
        }
        if (tekst) steg.push(tekst);
    }
    return steg;
}

// ========== HJELPEFUNKSJONAR ==========
function telKollektivLegs(legs) {
    return legs.filter(l => l.mode !== 'foot').length;
}

// Søk på nytt for ulåste skular
async function sokPaNyttForUlaste() {
    const ulåste = resultat.filter(r => !manuellOverstyring[r.skule]);
    
    if (ulåste.length === 0) {
        visStatus('Ingen ulåste skular å søke for', 'error');
        return;
    }
    
    const destinasjon = document.getElementById('destinasjon').value.trim();
    const maksGange = parseInt(document.getElementById('maksGange').value) || 2000;
    const dato = document.getElementById('dato').value;
    const tid = document.getElementById('ankomsttid').value;
    
    const destCoords = await geocodeAddress(destinasjon);
    if (!destCoords) {
        visStatus('Fann ikkje destinasjonen', 'error');
        return;
    }
    
    const arriveBy = `${dato}T${tid}:00`;
    
    const statusEl = document.getElementById('hurtigsokStatus');
    statusEl.style.display = 'block';
    
    // Fjern ulåste frå resultat
    resultat = resultat.filter(r => manuellOverstyring[r.skule]);
    
    for (let i = 0; i < ulåste.length; i++) {
        const r = ulåste[i];
        statusEl.innerHTML = `⏳ Søker på nytt ${i + 1}/${ulåste.length}: ${r.skule}...`;
        
        const skuleCoords = skuleKoordinatar[r.skule];
        if (!skuleCoords) continue;
        
        const trinnData = elevtalData.skular[r.skule]?.trinn?.[valtTrinn];
        if (!trinnData) continue;
        
        // Vel same klassar som før
        valgteKlassar = {};
        for (const klasse of r.klassar) {
            valgteKlassar[klasse.namn] = true;
        }
        
        try {
            await sokTransportForSkule(r.skule, skuleCoords, destCoords, arriveBy, maksGange, trinnData);
        } catch (e) {
            console.error('Feil ved nytt søk for', r.skule, e);
        }
        
        visResultat();
        await new Promise(resolve => setTimeout(resolve, 500));
    }
    
    statusEl.innerHTML = `✓ Ferdig! Søkte ${ulåste.length} skular på nytt.`;
}

// Finn valgt alternativ (overstyring eller automatisk)
function finnValgtAlternativ(skuleResultat) {
    const overstyrt = manuellOverstyring[skuleResultat.skule];
    if (overstyrt) {
        return skuleResultat.alternativ.find(a => a.type === overstyrt);
    }
    return skuleResultat.alternativ.find(a => a.beste);
}

// Bygg overstyring-knappar (berre låsing av gange eller bestillerbuss)
function byggOverstyringHTML(skuleResultat) {
    const gangeAlt = skuleResultat.alternativ.find(a => a.type === 'gange' && a.aktuelt);
    const bestillerbussAlt = skuleResultat.alternativ.find(a => a.type === 'bestillerbuss');
    const låst = manuellOverstyring[skuleResultat.skule];
    const autoValt = skuleResultat.alternativ.find(a => a.beste);
    
    // Escape skulenamn for bruk i onclick
    const skuleId = skuleResultat.skule.replace(/[^a-zA-Z0-9]/g, '_');
    
    let knappar = '';
    
    // Gange-knapp (viss aktuelt)
    if (gangeAlt) {
        const erLåst = låst === 'gange';
        const erAuto = !låst && autoValt?.type === 'gange';
        knappar += `<button class="overstyr-btn ${erLåst ? 'låst' : ''} ${erAuto ? 'auto' : ''}" 
            data-skule="${skuleResultat.skule}" data-type="gange" onclick="settLåsingFraKnapp(this)" title="Lås til gange">
            🚶 Gange ${erLåst ? '🔒' : erAuto ? '(auto)' : ''}
        </button>`;
    }
    
    // Bestillerbuss-knapp (alltid tilgjengeleg)
    if (bestillerbussAlt) {
        const erLåst = låst === 'bestillerbuss';
        const erAuto = !låst && autoValt?.type === 'bestillerbuss';
        knappar += `<button class="overstyr-btn ${erLåst ? 'låst' : ''} ${erAuto ? 'auto' : ''}" 
            data-skule="${skuleResultat.skule}" data-type="bestillerbuss" onclick="settLåsingFraKnapp(this)" title="Lås til bestillerbuss">
            🚐 Bestillerbuss ${erLåst ? '🔒' : erAuto ? '(auto)' : ''}
        </button>`;
    }
    
    // Info om kva som skjer med ikkje-låste skular
    const infoTekst = låst 
        ? `<span class="låst-info">🔒 Låst til ${låst}</span>` 
        : `<span class="ulåst-info">🔄 Får nytt søk per arrangement</span>`;
    
    return `
        <div class="overstyring-container">
            <span class="overstyring-label">Lås transport:</span>
            <div class="overstyring-knappar">${knappar}</div>
            ${låst ? `<button class="overstyr-reset" data-skule="${skuleResultat.skule}" onclick="fjernLåsingFraKnapp(this)">🔓 Lås opp</button>` : ''}
            ${infoTekst}
        </div>
    `;
}

// Sett låsing frå knapp
function settLåsingFraKnapp(btn) {
    const skuleNamn = btn.dataset.skule;
    const transportType = btn.dataset.type;
    
    // Toggle - viss allereie låst til same, fjern låsing
    if (manuellOverstyring[skuleNamn] === transportType) {
        delete manuellOverstyring[skuleNamn];
    } else {
        manuellOverstyring[skuleNamn] = transportType;
    }
    visResultat();
}

// Fjern låsing frå knapp
function fjernLåsingFraKnapp(btn) {
    const skuleNamn = btn.dataset.skule;
    delete manuellOverstyring[skuleNamn];
    visResultat();
}

    const erValgt = manuellOverstyring[skuleNamn] 
        ? (manuellOverstyring[skuleNamn] === alt.type)

    else if (alt.beste) badges += '<span class="transport-badge" style="background: #9ca3af; color: white;">AUTO</span>';
    if (!alt.aktuelt && alt.aktuelt !== undefined) badges += '<span class="transport-badge badge-uaktuelt">FOR LANGT</span>';
    if (alt.bytter > 0) badges += `<span class="transport-badge" style="background: #f59e0b; color: white;">${alt.bytter} bytte${alt.bytter > 1 ? 'r' : ''}</span>`;
    
    let tider = '';
    if (alt.avgang) {
        const avgangTid = new Date(alt.avgang).toLocaleTimeString('no-NO', {hour: '2-digit', minute: '2-digit', hour12: false});
        const ankomstTid = new Date(alt.ankomst).toLocaleTimeString('no-NO', {hour: '2-digit', minute: '2-digit', hour12: false});

            <div class="transport-tider">
                <span>Avgang: <strong>${avgangTid}</strong></span>
                <span>Ankomst: <strong>${ankomstTid}</strong></span>
                <span>Reisetid: <strong>${alt.varigheit} min</strong></span>
            </div>
        `;
    } else {
        tider = `<div class="transport-tider"><span>Estimert reisetid: <strong>${alt.varigheit} min</strong></span></div>`;
    }
    
    let linjeTekst = alt.namn;
    if (alt.linje) linjeTekst = `${alt.namn} ${alt.linje}`;
    
    // Bygg ekstra avgangar (for buss)
    let ekstraHTML = '';
    if (alt.ekstraAvgangar && alt.ekstraAvgangar.length > 0) {
        ekstraHTML = `
            <div class="ekstra-avgangar">
                <span class="ekstra-label">Andre avgangar:</span>
                ${alt.ekstraAvgangar.map(e => {
                    const avgTid = new Date(e.avgang).toLocaleTimeString('no-NO', {hour: '2-digit', minute: '2-digit', hour12: false});
                    const ankTid = new Date(e.ankomst).toLocaleTimeString('no-NO', {hour: '2-digit', minute: '2-digit', hour12: false});
                    const bytteInfo = e.bytter > 0 ? ` (${e.bytter} bytte)` : '';
                    return `<span class="ekstra-avgang" title="${e.linje || 'Buss'}${bytteInfo}">${avgTid}→${ankTid}</span>`;
                }).join('')}
            </div>
        `;
    }
    
    // Retur-klasse
    const returKlasse = erRetur ? 'retur' : '';
    
    return `
        <div class="transport-alternativ ${erValgt ? 'beste' : ''} ${!alt.aktuelt && alt.aktuelt !== undefined ? 'uaktuelt' : ''} ${returKlasse}">
            <div class="transport-type">
                <span class="transport-ikon">${alt.ikon}</span>
                <span>${linjeTekst}</span>
                ${badges}
            </div>
            ${tider}
            ${ekstraHTML}
            <div class="reiseveg">
                ${alt.reiseveg ? alt.reiseveg.map(s => `<div class="reiseveg-steg">→ ${s}</div>`).join('') : ''}
            </div>
        </div>
    `;
}

];

// Globale variablar for skule-velgar
let skuleVelgarType = null;
let valgteSkularForSok = new Set();

// Vis skule-velgar
function visSkuleVelgar(type) {
    if (!valtTrinn) {
        visStatus('Vel trinn først', 'error');
        return;
    }
    
    skuleVelgarType = type;
    valgteSkularForSok.clear();
    
    const container = document.getElementById('skuleVelgarContainer');
    const liste = document.getElementById('skuleVelgarListe');
    
    // Finn skular basert på type og trinn
    let skular = [];
    if (type === 'barneskule') {
        skular = [...BARNESKULAR];
        // Legg til kombinerte som har trinnet
        for (const skule of KOMBINERTE_SKULAR) {
            if (elevtalData.skular[skule]?.trinn?.[valtTrinn]) {
                skular.push(skule);
            }
        }
    } else {
        skular = [...UNGDOMSSKULAR];
        for (const skule of KOMBINERTE_SKULAR) {
            if (elevtalData.skular[skule]?.trinn?.[valtTrinn]) {
                skular.push(skule);
            }
        }
    }
    
    // Filtrer til skular som har elevar på trinnet
    skular = skular.filter(skule => {
        const trinnData = elevtalData.skular[skule]?.trinn?.[valtTrinn];
        return trinnData && trinnData.total > 0;
    });
    
    // Bygg avkryssingsliste
    liste.innerHTML = skular.map(skule => {
        const trinnData = elevtalData.skular[skule]?.trinn?.[valtTrinn];
        const elevar = trinnData?.total || 0;
        return `
            <label class="skule-velgar-item" onclick="toggleSkuleVal('${skule}', this)">
                <input type="checkbox" id="skuleVal_${skule.replace(/\s/g, '_')}">
                <span>${skule} (${elevar})</span>
            </label>
        `;
    }).join('');
    
    container.style.display = 'block';
    oppdaterSkuleVelgarTeller();
}

// Toggle skule-val
function toggleSkuleVal(skule, label) {
    const checkbox = label.querySelector('input[type="checkbox"]');
    
    if (valgteSkularForSok.has(skule)) {
        valgteSkularForSok.delete(skule);
        label.classList.remove('valt');
        checkbox.checked = false;
    } else {
        valgteSkularForSok.add(skule);
        label.classList.add('valt');
        checkbox.checked = true;
    }
    
    oppdaterSkuleVelgarTeller();
}

// Vel alle skular
function velgAlleSkular() {
    const labels = document.querySelectorAll('#skuleVelgarListe .skule-velgar-item');
    labels.forEach(label => {
        const skuleNamn = label.querySelector('span').textContent.split(' (')[0];
        const checkbox = label.querySelector('input[type="checkbox"]');
        valgteSkularForSok.add(skuleNamn);
        label.classList.add('valt');
        checkbox.checked = true;
    });
    oppdaterSkuleVelgarTeller();
}

// Fjern alle skular
function fjernAlleSkular() {

        return;
    }

        visStatus('Skriv inn destinasjon', 'error');

    }

        visStatus('Vel dato', 'error');
        return;
    }
    
    if (!valtTrinn) {
        visStatus('Vel trinn først', 'error');
        return;
    }
    
    const destCoords = await geocodeAddress(destinasjon);
    if (!destCoords) {
        visStatus('Fann ikkje destinasjonen', 'error');
        return;
    }
    
    const arriveBy = `${dato}T${tid}:00`;
    
    // Nullstill resultat

    document.getElementById('tilFordelingKnapp').style.display = 'none';
    document.getElementById('resultatTittel').style.display = 'block';
    document.getElementById('resultatTittel').textContent = `Resultat - ${valgteSkularForSok.size} skular`;
    
    const statusEl = document.getElementById('hurtigsokStatus');
    statusEl.style.display = 'block';
    
    const skularArray = Array.from(valgteSkularForSok);
    
    for (let i = 0; i < skularArray.length; i++) {
        const skuleNamn = skularArray[i];
        statusEl.innerHTML = `⏳ Søker ${i + 1}/${skularArray.length}: ${skuleNamn}...`;
        
        const skuleCoords = skuleKoordinatar[skuleNamn];
        if (!skuleCoords) {
            console.warn('Manglar koordinatar for:', skuleNamn);
            continue;
        }
        
        const trinnData = elevtalData.skular[skuleNamn]?.trinn?.[valtTrinn];
        if (!trinnData) continue;
        
        // Vel alle klassar for denne skulen
        valgteKlassar = {};
        for (const klasseNamn of Object.keys(trinnData.klassar)) {
            valgteKlassar[klasseNamn] = true;
        }
        
        try {
            await sokTransportForSkule(skuleNamn, skuleCoords, destCoords, arriveBy, maksGange, trinnData);

            console.error('Feil ved søk for', skuleNamn, e);

        visResultat();

    }
    
    statusEl.innerHTML = `✓ Ferdig! Søkte ${skularArray.length} skular.`;
    document.getElementById('navKnappar').style.display = 'flex';
    visFordelingKnapp();
}

async function sokAlleSkular(type) {
    const destinasjon = document.getElementById('destinasjon').value.trim();
    const maksGange = parseInt(document.getElementById('maksGange').value) || 2000;
    const dato = document.getElementById('dato').value;
    const tid = document.getElementById('ankomsttid').value;
    
    if (!destinasjon) {
        visStatus('Skriv inn destinasjon', 'error');
        return;
    }
    
    if (!valtTrinn) {
        visStatus('Vel trinn først', 'error');
        return;
    }
    
    // Sjekk at trinnet passar skuletypen
    const trinnNr = parseInt(valtTrinn);
    if (type === 'barneskule' && trinnNr > 7) {
        visStatus('Trinn 8-10 er ikkje på barneskular. Vel ungdomsskular.', 'error');
        return;
    }
    if (type === 'ungdomsskule' && trinnNr < 8) {
        visStatus('Trinn 1-7 er ikkje på ungdomsskular. Vel barneskular.', 'error');
        return;
    }
    
    // Geocode destinasjon om ikkje allereie gjort
    if (!destCoords) {
        visStatus('Finn destinasjon...', 'info');
        destCoords = await geocodeAddress(destinasjon);
        if (!destCoords) {
            visStatus('Kunne ikkje finne destinasjon', 'error');
            return;
        }
    }
    
    // Finn skular å søke
    let skularÅSøke = [];
    if (type === 'barneskule') {
        skularÅSøke = [...BARNESKULAR];
        // Legg til kombinerte skular som har dette trinnet
        for (const skule of KOMBINERTE_SKULAR) {
            if (elevtalData.skular[skule]?.trinn?.[valtTrinn]) {
                skularÅSøke.push(skule);
            }
        }
    } else {
        skularÅSøke = [...UNGDOMSSKULAR];
        // Legg til kombinerte skular som har dette trinnet
        for (const skule of KOMBINERTE_SKULAR) {
            if (elevtalData.skular[skule]?.trinn?.[valtTrinn]) {
                skularÅSøke.push(skule);
            }
        }
    }
    
    // Filtrer til skular som faktisk har elevar på dette trinnet
    skularÅSøke = skularÅSøke.filter(skuleNamn => {
        const skuleData = elevtalData.skular[skuleNamn];
        return skuleData?.trinn?.[valtTrinn]?.total > 0;
    });
    
    if (skularÅSøke.length === 0) {
        visStatus('Ingen skular funne for dette trinnet', 'error');
        return;
    }
    
    // Disable knappar
    document.getElementById('sokAlleBarneskular').disabled = true;
    document.getElementById('sokAlleUngdomsskular').disabled = true;
    const statusEl = document.getElementById('hurtigsokStatus');
    statusEl.style.display = 'block';
    
    // Tøm tidlegare resultat
    resultat = [];
    document.getElementById('resultatListe').innerHTML = '';
    document.getElementById('resultatTittel').style.display = 'block';
    document.getElementById('navKnappar').style.display = 'none';
    
    const arriveBy = `${dato}T${tid}:00`;
    
    for (let i = 0; i < skularÅSøke.length; i++) {
        const skuleNamn = skularÅSøke[i];
        statusEl.innerHTML = `Søker ${i + 1}/${skularÅSøke.length}: <strong>${skuleNamn}</strong>...`;
        
        // Sett skule for søket
        valtSkule = skuleNamn;
        
        // Sett alle klassar som valde
        const trinnData = elevtalData.skular[skuleNamn].trinn[valtTrinn];
        valgteKlassar = {};
        for (const klasseNamn of Object.keys(trinnData.klassar)) {
            valgteKlassar[klasseNamn] = true;
        }
        
        // Hent skulekoordinatar
        const skuleCoords = skuleKoordinatar[skuleNamn];
        if (!skuleCoords) {
            console.warn('Manglar koordinatar for:', skuleNamn);
            continue;
        }
        
        // Søk transport for denne skulen
        try {
            await sokTransportForSkule(skuleNamn, skuleCoords, destCoords, arriveBy, maksGange, trinnData);
        } catch (e) {
            console.error('Feil ved søk for', skuleNamn, e);
        }
        
        // Vis resultat fortløpande
        visResultat();
        
        // Litt pause mellom søk for å ikkje overbelaste API
        await new Promise(r => setTimeout(r, 500));
    }
    
    statusEl.innerHTML = `✓ Ferdig! Søkte ${skularÅSøke.length} skular.`;
    document.getElementById('sokAlleBarneskular').disabled = false;
    document.getElementById('sokAlleUngdomsskular').disabled = false;
    document.getElementById('navKnappar').style.display = 'flex';
    
    // Vis fordeling-knapp
    visFordelingKnapp();
}

async function sokTransportForSkule(skuleNamn, skuleCoords, destCoords, arriveBy, maksGange, trinnData) {
    // Søk parallelt
    const [gangeReiser, bussReiser, togReiser, googleGange, googleKøyring] = await Promise.all([
        finnReise(skuleCoords, destCoords, arriveBy, 'foot'),
        finnReise(skuleCoords, destCoords, arriveBy, 'bus'),
        finnReise(skuleCoords, destCoords, arriveBy, 'rail'),
        hentGoogleAvstand(skuleCoords, destCoords, 'WALKING'),
        hentGoogleAvstand(skuleCoords, destCoords, 'DRIVING')
    ]);
    
    // Hent elevtal
    let elevarMed = 0;
    const klassarMed = [];
    for (const [klasseNamn, elevar] of Object.entries(trinnData.klassar)) {
        if (valgteKlassar[klasseNamn]) {
            elevarMed += elevar;
            klassarMed.push({ namn: klasseNamn, elevar: elevar });
        }
    }
    
    // Bygg resultat
    const skuleResultat = {
        skule: skuleNamn,
        trinn: valtTrinn,
        klassar: klassarMed,
        elevar: elevarMed,
        alternativ: []
    };
    
    // Gange
    const gangeReise = gangeReiser?.[0];
    const gangeAlt = {
        type: 'gange',
        ikon: '🚶',
        namn: 'Gange',
        avstand: googleGange.avstand,
        varigheit: googleGange.tid,
        aktuelt: googleGange.avstand <= maksGange,
        reiseveg: [`Gå ${googleGange.avstandTekst || ((googleGange.avstand/1000).toFixed(1) + ' km')} (${googleGange.tidTekst || googleGange.tid + ' min'})`]
    };
    if (gangeReise) {
        gangeAlt.avgang = gangeReise.startTime;
        gangeAlt.ankomst = gangeReise.endTime;
    }
    skuleResultat.alternativ.push(gangeAlt);
    
    // Buss - vis opptil 3 alternativ (prioriter direkteruter)
    if (bussReiser && bussReiser.length > 0) {
        const sorterteBussar = [...bussReiser].sort((a, b) => {
            const legsA = telKollektivLegs(a.legs);
            const legsB = telKollektivLegs(b.legs);
            if (legsA !== legsB) return legsA - legsB;
            return a.duration - b.duration;
        });
        
        const bussReise = sorterteBussar[0];
        const kollektivLegs = telKollektivLegs(bussReise.legs);
        const erDirekte = kollektivLegs === 1;
        
        const bussAlt = {
            type: 'buss',
            ikon: '🚌',
            namn: erDirekte ? 'Direktebuss' : 'Rutebuss',
            avgang: bussReise.startTime,
            ankomst: bussReise.endTime,
            varigheit: Math.round(bussReise.duration / 60),
            aktuelt: true,
            bytter: kollektivLegs - 1,
            reiseveg: byggReiseveg(bussReise.legs),
            ekstraAvgangar: []
        };
        const bussLegs = bussReise.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
        if (bussLegs.length > 0) {
            bussAlt.linje = bussLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
        }
        
        // Legg til ekstra avgangar (alternativ 2 og 3)
        for (let i = 1; i < Math.min(3, sorterteBussar.length); i++) {
            const ekstraBuss = sorterteBussar[i];
            const ekstraLegs = ekstraBuss.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
            bussAlt.ekstraAvgangar.push({
                avgang: ekstraBuss.startTime,
                ankomst: ekstraBuss.endTime,
                varigheit: Math.round(ekstraBuss.duration / 60),
                linje: ekstraLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → '),
                bytter: telKollektivLegs(ekstraBuss.legs) - 1
            });
        }
        
        skuleResultat.alternativ.push(bussAlt);
    }
    
    // Tog
    if (togReiser && togReiser.length > 0) {
        const togReise = togReiser[0];
        const kollektivLegs = telKollektivLegs(togReise.legs);
        const erDirekte = kollektivLegs === 1;
        
        const togAlt = {
            type: 'tog',
            ikon: '🚂',
            namn: erDirekte ? 'Direktetog' : 'Tog',
            avgang: togReise.startTime,
            ankomst: togReise.endTime,
            varigheit: Math.round(togReise.duration / 60),
            aktuelt: true,
            bytter: kollektivLegs - 1,
            reiseveg: byggReiseveg(togReise.legs)
        };
        const togLegs = togReise.legs.filter(l => l.mode === 'rail');
        if (togLegs.length > 0) {
            togAlt.linje = togLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
        }
        skuleResultat.alternativ.push(togAlt);
    }
    
    // Bestillerbuss
    const bestillerbussAlt = {
        type: 'bestillerbuss',
        ikon: '🚐',
        namn: 'Bestillerbuss',
        avstand: googleKøyring.avstand,
        varigheit: googleKøyring.tid,
        aktuelt: true,
        reiseveg: [`${googleKøyring.avstandTekst || ((googleKøyring.avstand/1000).toFixed(1) + ' km')} (${googleKøyring.tidTekst || googleKøyring.tid + ' min'})`]
    };
    skuleResultat.alternativ.push(bestillerbussAlt);
    
    // Finn beste alternativ
    // Prioritet: 1. Gange (viss under maks), 2. Tog (direktetog), 3. Direktebuss, 4. Bestillerbuss
    // ALDRI vel rutebuss med bytte automatisk
    const aktuelle = skuleResultat.alternativ.filter(a => a.aktuelt);
    const bestillerbussTid = bestillerbussAlt.varigheit;
    
    // Finn gange, direktetog og direktebuss
    const gangeAltFunne = aktuelle.find(a => a.type === 'gange' && a.aktuelt);
    const togAltFunne = aktuelle.find(a => a.type === 'tog' && (a.bytter === 0 || a.bytter === undefined));
    const direktebussAltFunne = aktuelle.find(a => a.type === 'buss' && (a.bytter === 0 || a.bytter === undefined));
    
    // Prioritert rekkefølge (ALDRI rutebuss med bytte)
    let valtAlternativ = null;
    
    // 1. Gange viss under maks avstand
    if (gangeAltFunne && gangeAltFunne.aktuelt) {
        valtAlternativ = gangeAltFunne;
    }
    // 2. Direktetog (prioritert over rutebuss)
    else if (togAltFunne) {
        valtAlternativ = togAltFunne;
    }
    // 3. Direktebuss (utan bytte)
    else if (direktebussAltFunne) {
        valtAlternativ = direktebussAltFunne;
    }
    // 4. Ingen kollektiv utan bytte - bruk bestillerbuss
    // (rutebuss med bytte blir ALDRI valt automatisk)
    
    // Sjekk om bestillerbuss er 30+ min raskare enn valt alternativ
    if (valtAlternativ) {
        if (bestillerbussTid + 30 < valtAlternativ.varigheit) {
            bestillerbussAlt.beste = true;
        } else {
            valtAlternativ.beste = true;
        }
    } else {
        // Ingen direkterute - bruk bestillerbuss
        bestillerbussAlt.beste = true;
    }
    
    // RETURSØK - viss aktivert
    if (inkluderRetur) {
        const returtid = document.getElementById('returtid').value;
        const dato = document.getElementById('dato').value;
        const departBy = `${dato}T${returtid}:00`;
        
        // Søk retur (destinasjon -> skule, departureTime)
        const [returBuss, returTog] = await Promise.all([
            finnReiseRetur(destCoords, skuleCoords, departBy, 'bus'),
            finnReiseRetur(destCoords, skuleCoords, departBy, 'rail')
        ]);
        
        skuleResultat.retur = {
            tid: returtid,
            alternativ: []
        };
        
        // Retur gange (same som tur)
        const returGange = {
            type: 'gange',
            ikon: '🚶',
            namn: 'Gange',
            avstand: googleGange.avstand,
            varigheit: googleGange.tid,
            aktuelt: googleGange.avstand <= maksGange,
            reiseveg: [`Gå ${googleGange.avstandTekst || ((googleGange.avstand/1000).toFixed(1) + ' km')}`]
        };
        skuleResultat.retur.alternativ.push(returGange);
        
        // Retur buss
        if (returBuss && returBuss.length > 0) {
            const sortert = [...returBuss].sort((a, b) => {
                const legsA = telKollektivLegs(a.legs);
                const legsB = telKollektivLegs(b.legs);
                if (legsA !== legsB) return legsA - legsB;
                return a.duration - b.duration;
            });
            
            const beste = sortert[0];
            const kollektivLegs = telKollektivLegs(beste.legs);
            const bussLegs = beste.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
            
            skuleResultat.retur.alternativ.push({
                type: 'buss',
                ikon: '🚌',
                namn: kollektivLegs === 1 ? 'Direktebuss' : 'Rutebuss',
                avgang: beste.startTime,
                ankomst: beste.endTime,
                varigheit: Math.round(beste.duration / 60),
                bytter: kollektivLegs - 1,
                linje: bussLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → '),
                reiseveg: byggReiseveg(beste.legs)
            });
        }
        
        // Retur tog
        if (returTog && returTog.length > 0) {
            const beste = returTog[0];
            const kollektivLegs = telKollektivLegs(beste.legs);
            const togLegs = beste.legs.filter(l => l.mode === 'rail');
            
            skuleResultat.retur.alternativ.push({
                type: 'tog',
                ikon: '🚂',
                namn: kollektivLegs === 1 ? 'Direktetog' : 'Tog',
                avgang: beste.startTime,
                ankomst: beste.endTime,
                varigheit: Math.round(beste.duration / 60),
                bytter: kollektivLegs - 1,
                linje: togLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → '),
                reiseveg: byggReiseveg(beste.legs)
            });
        }
        
        // Retur bestillerbuss
        skuleResultat.retur.alternativ.push({
            type: 'bestillerbuss',
            ikon: '🚐',
            namn: 'Bestillerbuss',
            varigheit: googleKøyring.tid,
            reiseveg: [`${googleKøyring.avstandTekst || ((googleKøyring.avstand/1000).toFixed(1) + ' km')}`]
        });
        
        // Marker beste retur (same logikk som tur)
        const returAktuelle = skuleResultat.retur.alternativ;
        const returGangeAlt = returAktuelle.find(a => a.type === 'gange' && a.aktuelt);
        const returTogAlt = returAktuelle.find(a => a.type === 'tog' && (a.bytter === 0 || a.bytter === undefined));
        const returBussAlt = returAktuelle.find(a => a.type === 'buss' && (a.bytter === 0 || a.bytter === undefined));
        const returBestillerbuss = returAktuelle.find(a => a.type === 'bestillerbuss');
        
        if (returGangeAlt?.aktuelt) {
            returGangeAlt.beste = true;
        } else if (returTogAlt) {
            returTogAlt.beste = true;
        } else if (returBussAlt) {
            returBussAlt.beste = true;
        } else if (returBestillerbuss) {
            returBestillerbuss.beste = true;
        }
    }
    
    resultat.push(skuleResultat);
}

// Kategoriser reisemåte for kvar skule (brukar manuell overstyring viss sett)
function kategoriserSkule(skuleResultat) {
    // Sjekk manuell overstyring først
    const overstyrt = manuellOverstyring[skuleResultat.skule];
    let valgt;
    
    if (overstyrt) {
        valgt = skuleResultat.alternativ.find(a => a.type === overstyrt);
    } else {
        valgt = skuleResultat.alternativ.find(a => a.beste);
    }
    
    if (!valgt) return { type: 'ukjent', kapasitet: 25 };
    
    switch (valgt.type) {
        case 'gange':
            return { type: 'gange', kapasitet: 999, ikon: '🚶', namn: 'Gange' };
        case 'tog':
            return { type: 'tog', kapasitet: 999, ikon: '🚂', namn: 'Tog' };
        case 'bestillerbuss':
            return { type: 'bestillerbuss', kapasitet: 55, ikon: '🚐', namn: 'Bestillerbuss' };
        case 'buss':
            return { 
                type: 'rutebuss', 
                kapasitet: 25, 
                ikon: '🚌', 
                namn: 'Rutebuss',
                linje: valgt.linje,
                avgang: valgt.avgang
            };
        default:
            return { type: 'ukjent', kapasitet: 25 };
    }
}

// Bygg oppsummering
function byggOppsummering() {
    let totalElevar = 0;
    let totalKlassar = 0;
    const kategoriar = { gange: 0, tog: 0, bestillerbuss: 0, rutebuss: 0 };
    const elevarPerKategori = { gange: 0, tog: 0, bestillerbuss: 0, rutebuss: 0 };
    
    for (const r of resultat) {
        totalElevar += r.elevar;
        totalKlassar += r.klassar.length;
        
        const kat = kategoriserSkule(r);
        if (kategoriar[kat.type] !== undefined) {
            kategoriar[kat.type]++;
            elevarPerKategori[kat.type] += r.elevar;
        }
    }
    
    document.getElementById('oppsummeringInnhald').innerHTML = `
        <div class="oppsummering-grid">
            <div class="oppsummering-kort">
                <div class="tal">${resultat.length}</div>
                <div class="label">Skular</div>
            </div>
            <div class="oppsummering-kort">
                <div class="tal">${totalKlassar}</div>
                <div class="label">Klassar</div>
            </div>
            <div class="oppsummering-kort">
                <div class="tal">${totalElevar}</div>
                <div class="label">Elevar totalt</div>
            </div>
        </div>
        
        <div class="kategori-liste">
            <div class="kategori-rad">
                <span><span class="ikon">🚶</span>Gange (heile trinnet)</span>
                <span class="tal">${kategoriar.gange} skular, ${elevarPerKategori.gange} elevar</span>
            </div>
            <div class="kategori-rad">
                <span><span class="ikon">🚂</span>Tog (heile trinnet)</span>
                <span class="tal">${kategoriar.tog} skular, ${elevarPerKategori.tog} elevar</span>
            </div>
            <div class="kategori-rad">
                <span><span class="ikon">🚐</span>Bestillerbuss (~55 per buss)</span>
                <span class="tal">${kategoriar.bestillerbuss} skular, ${elevarPerKategori.bestillerbuss} elevar</span>
            </div>
            <div class="kategori-rad">
                <span><span class="ikon">🚌</span>Rutebuss (1 klasse per avgang)</span>
                <span class="tal">${kategoriar.rutebuss} skular, ${elevarPerKategori.rutebuss} elevar</span>
            </div>
        </div>
    `;
}

// Bygg anslag
function byggAnslag() {
    let totalElevar = 0;
    let rutebussKlassar = 0;
    
    for (const r of resultat) {
        totalElevar += r.elevar;
        const kat = kategoriserSkule(r);
        if (kat.type === 'rutebuss') {
            rutebussKlassar += r.klassar.length;
        }
    }
    
    // Anslag: snitt 20-25 per klasse for rutebuss, resten kan grupperast
    const snittstorleik = 150; // Typisk salkapasitet
    const minArrangement = Math.ceil(totalElevar / snittstorleik);
    
    // Rutebuss-klassar må spreies - maks ~5-6 per arrangement pga bussavgangar
    const rutebussAnslag = Math.ceil(rutebussKlassar / 5);
    
    const anbefaltArrangement = Math.max(minArrangement, rutebussAnslag);
    
    document.getElementById('anslagInnhald').innerHTML = `
        <div class="kategori-liste">
            <div class="kategori-rad">
                <span>Totalt elevar</span>
                <span class="tal">${totalElevar}</span>
            </div>
            <div class="kategori-rad">
                <span>Med salkapasitet ~150</span>
                <span class="tal">Minst ${minArrangement} visningar</span>
            </div>
            <div class="kategori-rad">
                <span>Rutebuss-klassar (må spreies)</span>
                <span class="tal">${rutebussKlassar} klassar</span>
            </div>
            <div class="kategori-rad" style="background: #ecfdf5; border: 1px solid #10b981;">
                <span><strong>Anbefalt antal visningar</strong></span>
                <span class="tal" style="color: #10b981;">${anbefaltArrangement}–${anbefaltArrangement + 2}</span>
            </div>
        </div>
        <p style="font-size: 13px; color: #666; margin-top: 10px;">
            💡 Tips: Legg inn visningar under, så fordeler systemet elevane automatisk.
        </p>
    `;
}
