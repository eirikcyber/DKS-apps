// Oppdater fordel-knapp
function oppdaterFordelKnapp() {
    document.getElementById('fordelBtn').disabled = arrangement.length === 0;
}

// ========== FORDELINGSALGORITME ==========

async function kjorFordeling() {
    // Vis status
    document.getElementById('fordelBtn').disabled = true;
    document.getElementById('fordelBtn').textContent = '⏳ Søker reiseruter...';
    
    // Nullstill plasseringar
    for (const arr of arrangement) {
        arr.plasseringar = [];
    }
    
    // Sorter arrangement etter dato/tid
    const sortert = [...arrangement].sort((a, b) => {
        if (a.dato !== b.dato) return a.dato.localeCompare(b.dato);
        return a.tid.localeCompare(b.tid);
    });
    
    // Del skular i låste og ikkje-låste
    const låsteSkular = [];
    const ulåsteSkular = [];
    
    for (const r of resultat) {
        const låst = manuellOverstyring[r.skule];
        if (låst === 'gange' || låst === 'bestillerbuss') {
            låsteSkular.push({ ...r, låstTil: låst });
        } else {
            ulåsteSkular.push(r);
        }
    }
    
    // Hent destinasjonskoordinatar
    const destCoords = await geocodeAddress(document.getElementById('destinasjon').value);
    const maksGange = parseInt(document.getElementById('maksGange').value) || 2000;
    
    // For kvar arrangement: søk rutebussar for ikkje-låste skular
    const konfliktar = [];
    const rutebussEinheiter = []; // Alle rutebuss-klassar på tvers av arrangement
    
    for (let arrIdx = 0; arrIdx < sortert.length; arrIdx++) {
        const arr = sortert[arrIdx];
        const arriveBy = `${arr.dato}T${arr.tid}:00`;
        
        // Søk nye rutetider for ikkje-låste skular
        for (const r of ulåsteSkular) {
            const skuleCoords = skuleKoordinatar[r.skule];
            if (!skuleCoords) continue;
            
            // Søk buss og tog for dette tidspunktet
            try {
                const [bussReiser, togReiser] = await Promise.all([
                    finnReise(skuleCoords, destCoords, arriveBy, 'bus'),
                    finnReise(skuleCoords, destCoords, arriveBy, 'rail')
                ]);
                
                // Finn direktebuss (utan bytte)
                let direktebuss = null;
                if (bussReiser && bussReiser.length > 0) {
                    const sortert = [...bussReiser].sort((a, b) => {
                        const legsA = telKollektivLegs(a.legs);
                        const legsB = telKollektivLegs(b.legs);
                        if (legsA !== legsB) return legsA - legsB;
                        return a.duration - b.duration;
                    });
                    const beste = sortert[0];
                    if (telKollektivLegs(beste.legs) === 1) {
                        direktebuss = beste;
                    }
                }
                
                // Finn direktetog
                let direktetog = null;
                if (togReiser && togReiser.length > 0) {
                    const beste = togReiser[0];
                    if (telKollektivLegs(beste.legs) === 1) {
                        direktetog = beste;
                    }
                }
                
                // Prioritet: Tog > Direktebuss
                let valgtReise = null;
                let transportType = null;
                
                if (direktetog) {
                    valgtReise = direktetog;
                    transportType = 'tog';
                } else if (direktebuss) {
                    valgtReise = direktebuss;
                    transportType = 'buss';
                }
                
                if (valgtReise && transportType === 'buss') {
                    // Legg til som rutebuss-einheit
                    const bussLegs = valgtReise.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
                    const linje = bussLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
                    
                    for (const klasse of r.klassar) {
                        rutebussEinheiter.push({
                            skule: r.skule,
                            klasse: klasse.namn,
                            elevar: klasse.elevar,
                            arrangementIdx: arrIdx,
                            kategori: { type: 'rutebuss', ikon: '🚌', namn: 'Rutebuss' },
                            erRutebuss: true,
                            bussLinje: linje,
                            bussAvgang: valgtReise.startTime,
                            bussAnkomst: valgtReise.endTime,
                            varigheit: Math.round(valgtReise.duration / 60)
                        });
                    }
                } else if (valgtReise && transportType === 'tog') {
                    // Tog - plasser direkte på arrangement
                    const togLegs = valgtReise.legs.filter(l => l.mode === 'rail');
                    const linje = togLegs.map(l => l.line?.publicCode).filter(Boolean).join(' → ');
                    
                    arr.plasseringar.push({
                        skule: r.skule,
                        klasse: r.klassar.map(k => k.namn).join(', '),
                        elevar: r.elevar,
                        kategori: { type: 'tog', ikon: '🚂', namn: 'Tog' },
                        erRutebuss: false,
                        togLinje: linje,
                        avgang: valgtReise.startTime,
                        ankomst: valgtReise.endTime,
                        varigheit: Math.round(valgtReise.duration / 60)
                    });
                } else {
                    // Ingen direkterute - må bruke bestillerbuss
                    // Markerer som "treng bestillerbuss"
                    arr.plasseringar.push({
                        skule: r.skule,
                        klasse: r.klassar.map(k => k.namn).join(', '),
                        elevar: r.elevar,
                        kategori: { type: 'bestillerbuss', ikon: '🚐', namn: 'Bestillerbuss' },
                        erRutebuss: false,
                        merknad: 'Ingen direkterute funne'
                    });
                }
            } catch (e) {
                console.error('Feil ved søk for', r.skule, e);
            }
            
            // Litt pause mellom søk
            await new Promise(resolve => setTimeout(resolve, 300));
        }
        
        document.getElementById('fordelBtn').textContent = `⏳ Søker... (${arrIdx + 1}/${sortert.length})`;
    }
    
    // Fordel rutebuss-klassar JAMT utover (round-robin)
    // Sorter etter linje først slik at same linje blir spreidd
    rutebussEinheiter.sort((a, b) => {
        if (a.bussLinje !== b.bussLinje) return a.bussLinje?.localeCompare(b.bussLinje) || 0;
        return a.skule.localeCompare(b.skule);
    });
    
    let arrIdx = 0;
    for (const eining of rutebussEinheiter) {
        let plassert = false;
        let forsøk = 0;
        
        // Prøv å plassere, start frå arrIdx og roter rundt
        while (forsøk < sortert.length) {
            const arr = sortert[(arrIdx + forsøk) % sortert.length];
            const brukt = arr.plasseringar.reduce((sum, p) => sum + p.elevar, 0);
            const ledig = arr.kapasitet - brukt;
            
            if (eining.elevar <= ledig) {
                // Sjekk rutebuss-konflikt
                const konflikt = sjekkRutebussKonflikt(arr, eining);
                if (konflikt) {
                    konfliktar.push(konflikt);
                    forsøk++;
                    continue;
                }
                
                arr.plasseringar.push(eining);
                plassert = true;
                arrIdx = (arrIdx + 1) % sortert.length; // Neste arrangement for neste eining
                break;
            }
            forsøk++;
        }
        
        if (!plassert) {
            konfliktar.push({
                type: 'ikkje-plass',
                melding: `${eining.skule} ${eining.klasse} (${eining.elevar} elevar) fekk ikkje plass`
            });
        }
    }
    
    // Plasser låste skular (gange og bestillerbuss)
    for (const r of låsteSkular) {
        const eining = {
            skule: r.skule,
            klasse: r.klassar.map(k => k.namn).join(', '),
            elevar: r.elevar,
            kategori: r.låstTil === 'gange' 
                ? { type: 'gange', ikon: '🚶', namn: 'Gange' }
                : { type: 'bestillerbuss', ikon: '🚐', namn: 'Bestillerbuss' },
            erRutebuss: false,
            låst: true
        };
        
        // For bestillerbuss: splitt i grupper på ~55
        if (r.låstTil === 'bestillerbuss' && r.elevar > 55) {
            let resterande = r.elevar;
            let gruppeNr = 1;
            
            while (resterande > 0) {
                const gruppeStorleik = Math.min(55, resterande);
                const gruppeEining = {
                    ...eining,
                    klasse: `Gruppe ${gruppeNr}`,
                    elevar: gruppeStorleik
                };
                
                // Finn arrangement med plass
                let plassert = false;
                for (const arr of sortert) {
                    const brukt = arr.plasseringar.reduce((sum, p) => sum + p.elevar, 0);
                    if (gruppeStorleik <= arr.kapasitet - brukt) {
                        arr.plasseringar.push(gruppeEining);
                        plassert = true;
                        break;
                    }
                }
                
                if (!plassert) {
                    konfliktar.push({
                        type: 'ikkje-plass',
                        melding: `${r.skule} Gruppe ${gruppeNr} (${gruppeStorleik} elevar) fekk ikkje plass`
                    });
                }
                
                resterande -= gruppeStorleik;
                gruppeNr++;
            }
        } else {
            // Finn arrangement med plass
            let plassert = false;
            for (const arr of sortert) {
                const brukt = arr.plasseringar.reduce((sum, p) => sum + p.elevar, 0);
                if (eining.elevar <= arr.kapasitet - brukt) {
                    arr.plasseringar.push(eining);
                    plassert = true;
                    break;
                }
            }
            
            if (!plassert) {
                konfliktar.push({
                    type: 'ikkje-plass',
                    melding: `${r.skule} (${r.elevar} elevar) fekk ikkje plass`
                });
            }
        }
    }
    
    // Vis resultat
    document.getElementById('fordelBtn').disabled = false;
    document.getElementById('fordelBtn').textContent = '🎯 Fordel elevar på arrangement';
    visFordelingResultat(sortert, konfliktar);
}

// Sjekk rutebuss-konflikt
function sjekkRutebussKonflikt(arr, nyEining) {
    if (!nyEining.bussAvgang) return null;
    
    const nyAvgangTid = new Date(nyEining.bussAvgang).getTime();
    
    for (const eksisterande of arr.plasseringar) {
        if (!eksisterande.erRutebuss || !eksisterande.bussAvgang) continue;
        if (eksisterande.bussLinje !== nyEining.bussLinje) continue;
        
        const eksAvgangTid = new Date(eksisterande.bussAvgang).getTime();
        const diffMinutt = Math.abs(nyAvgangTid - eksAvgangTid) / (1000 * 60);
        
        if (diffMinutt <= 30) {
            return {
                type: 'rutebuss-konflikt',
                melding: `${nyEining.skule} ${nyEining.klasse} og ${eksisterande.skule} ${eksisterande.klasse} brukar begge buss ${nyEining.bussLinje} (±30 min) - MOGLEG KONFLIKT`
            };
        }
    }
    
    return null;
}

    }).join('');
    
    document.getElementById('fordelingResultat').scrollIntoView({ behavior: 'smooth' });
}

// Eksporter fordeling
function eksporterFordeling() {
    let tekst = `DKS TRANSPORT - FORDELING\n`;
    tekst += `Generert: ${new Date().toLocaleString('no-NO')}\n`;
    tekst += `Destinasjon: ${document.getElementById('destinasjon').value}\n`;
    tekst += `Trinn: ${valtTrinn}\n`;
    tekst += `=`.repeat(60) + `\n\n`;
    
    const sortert = [...arrangement].sort((a, b) => {
        if (a.dato !== b.dato) return a.dato.localeCompare(b.dato);
        return a.tid.localeCompare(b.tid);
    });
    
    for (const arr of sortert) {
        const datoStr = new Date(arr.dato).toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long' });
        const totalElevar = arr.plasseringar.reduce((sum, p) => sum + p.elevar, 0);
        
        tekst += `📅 ${datoStr} kl ${arr.tid}\n`;
        tekst += `   ${arr.sal} (${totalElevar}/${arr.kapasitet} plassar)\n`;
        tekst += `-`.repeat(40) + `\n`;
        
        for (const p of arr.plasseringar) {
            const transport = p.erRutebuss ? `Buss ${p.bussLinje}` : p.kategori.namn;
            tekst += `   ${p.kategori.ikon} ${p.skule} - ${p.klasse}\n`;
            tekst += `      ${p.elevar} elevar, ${transport}\n`;
        }
        tekst += `\n`;
    }
    
    // Last ned som fil
    const blob = new Blob([tekst], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `fordeling_${valtTrinn}trinn_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

// Nullstill fordeling
function nullstillFordeling() {
    arrangement = [];
    visArrangementListe();
    document.getElementById('fordelingResultat').style.display = 'none';
    oppdaterFordelKnapp();
}

    document.getElementById('turneModusContainer').style.display = mode === 'turne' ? '' : 'none';

        lastTurnearFraAPI();
    }
}

const TURNE_CACHE_KEY = 'dks_turnear_v1';
const TURNE_CACHE_TTL = 6 * 60 * 60 * 1000; // 6 timar

async function lastTurnearFraAPI() {
    const velg = document.getElementById('turneVelg');
    const sokEl = document.getElementById('turneSok');
    const status = document.getElementById('turneLastStatus');
    velg.innerHTML = '<option value="">Laster…</option>';
    sokEl.style.display = 'none';

    // Sjekk cache
    try {
        const cached = JSON.parse(localStorage.getItem(TURNE_CACHE_KEY) || 'null');
        if (cached && (Date.now() - cached.ts) < TURNE_CACHE_TTL) {
            alleTurnear = cached.tours;
            const alder = Math.round((Date.now() - cached.ts) / 60000);
            status.textContent = `(${cached.tours.length} Asker-turnear, henta for ${alder} min sidan)`;
            sokEl.style.display = cached.tours.length > 8 ? '' : 'none';
            fyllTurnearDropdown(cached.tours);
            return;
        }
    } catch (_) {}

    const baseUrl = 'https://portal.denkulturelleskolesekken.no/public/events/findBySchool?orgNumber=';
    let ferdig = 0;
    status.textContent = `Hentar (0/${SKULAR_ORG.length})…`;

    async function hentForSkule({org}) {
        const tourMap = {};
        try {
            let page = 1;
            while (true) {
                const resp = await fetch(`${baseUrl}${org}&page=${page}`);
                if (!resp.ok) break;
                const evs = await resp.json();
                if (!Array.isArray(evs) || evs.length === 0) break;
                for (const ev of evs) {
                    if (ev.tour && ev.tour.id) tourMap[ev.tour.id] = ev.tour;
                }
                if (evs.length < 15) break;
                page++;
            }
        } catch (_) {}
        ferdig++;
        status.textContent = `Hentar (${ferdig}/${SKULAR_ORG.length})…`;
        return tourMap;
    }

    // Parallell henting, maks 8 samtidige
    const resultat = {};
    const BATCH = 8;
    for (let i = 0; i < SKULAR_ORG.length; i += BATCH) {
        const batch = SKULAR_ORG.slice(i, i + BATCH);
        const batchResultat = await Promise.all(batch.map(hentForSkule));
        for (const map of batchResultat) Object.assign(resultat, map);
    }

    const tours = Object.values(resultat);
    tours.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'nb'));
    alleTurnear = tours;

    // Lagre i cache
    try {
        localStorage.setItem(TURNE_CACHE_KEY, JSON.stringify({ts: Date.now(), tours}));
    } catch (_) {}

    if (tours.length === 0) {
        velg.innerHTML = '<option value="">Ingen Asker-turnear funne</option>';
        status.textContent = '';
        return;
    }

    sokEl.style.display = tours.length > 8 ? '' : 'none';
    status.textContent = `(${tours.length} Asker-turnear)`;
    fyllTurnearDropdown(tours);
}

function fyllTurnearDropdown(liste) {
    const velg = document.getElementById('turneVelg');
    velg.innerHTML = '<option value="">– Vel turné –</option>';
    for (const t of liste) {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name || `Turné ${t.id}`;
        velg.appendChild(opt);
    }
}

function filtrerTurnear(q) {
    const q2 = q.trim().toLowerCase();
    const filtrert = q2
        ? alleTurnear.filter(t => (t.name || '').toLowerCase().includes(q2))
        : alleTurnear;
    fyllTurnearDropdown(filtrert);
    const status = document.getElementById('turneLastStatus');
    status.textContent = q2
        ? `(${filtrert.length} av ${alleTurnear.length})`
        : `(${alleTurnear.length} totalt — søk for å filtrere)`;
}

function velgTurne(id) {
    if (id) document.getElementById('turneId').value = id;
}

// Hent skular frå event: prøv schools-dict, så participants som fallback
function skuleFraEvent(e) {
    if (e.schools && typeof e.schools === 'object') {
        const skuler = Object.values(e.schools).filter(s => s && s.id && s.name);
        if (skuler.length > 0) return skuler;
    }
    if (Array.isArray(e.participants)) {
        const map = {};
        for (const p of e.participants) {
            const s = p.school || (p.registrationGroup && p.registrationGroup.school);
            if (s && s.id && s.name) map[s.id] = { id: s.id, name: s.name };
        }
        const skuler = Object.values(map);
        if (skuler.length > 0) return skuler;
    }
    return [];
}

async function hentAlleTurneArrangement(tourId, statusEl) {
    const baseUrl = `https://portal.denkulturelleskolesekken.no/public/events/findByTourId?tourId=${tourId}`;
    const limit = 100;
    let offset = 0;
    let alle = [];

    while (true) {
        const url = `${baseUrl}&limit=${limit}&offset=${offset}`;
        if (statusEl) statusEl.textContent = `Hentar arrangement (${alle.length} henta så langt)...`;
        const resp = await corsHent(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        let side, hasMore;
        if (Array.isArray(data)) {
            side = data;
            hasMore = side.length === limit;
        } else if (data && Array.isArray(data.rows)) {
            side = data.rows;
            hasMore = !!data.hasMore;
        } else {
            side = [];
            hasMore = false;
        }

        alle = alle.concat(side);
        if (!hasMore || side.length === 0) break;
        offset += limit;
    }

    return alle;
}

async function hentTurne() {
    const tourId = document.getElementById('turneId').value.trim();
    if (!tourId) {
        document.getElementById('turneStatus').textContent = 'Skriv inn turné-ID';
        return;
    }

    const turneStatusEl = document.getElementById('turneStatus');
    turneStatusEl.textContent = 'Hentar turné frå portalen...';
    turneHendingar = [];
    turneResultat = [];
    turneOverstyring = {};
    // Slett gammal DRIVING-cache (fallback-fart kan ha vore feil)
    for (const k of Object.keys(localStorage)) {
        if (k.startsWith('gmap_DRIVING_')) localStorage.removeItem(k);
    }
    document.getElementById('turneResultatSeksjon').style.display = 'none';
    document.getElementById('turneResultatListe').innerHTML = '';
    document.getElementById('turnePayload').style.display = 'none';

    try {
        const events = await hentAlleTurneArrangement(tourId, turneStatusEl);

        if (!Array.isArray(events) || events.length === 0) {
            turneStatusEl.textContent = 'Ingen arrangement funne for denne turnéen.';
            return;
        }

        const now = new Date();
        turneHendingar = events
            .sort((a, b) => turneParseDate(a.dateStart) - turneParseDate(b.dateStart))
            .map(e => {
                let dCoords = null;
                if (e.location && e.location.address && e.location.address.coordinate) {
                    dCoords = {
                        lat: e.location.address.coordinate.lat,
                        lon: e.location.address.coordinate.lng
                    };
                }
                const skuler = skuleFraEvent(e);
                const dato = turneParseDate(e.dateStart);
                // Aggreger elevtal per skule frå participants
                const elevtalPerSkule = {};
                for (const p of (e.participants || [])) {
                    const rg = p.registrationGroup || p;
                    const sid = rg.schoolId;
                    const n = rg.numberOfStudents;
                    if (sid && n) elevtalPerSkule[sid] = (elevtalPerSkule[sid] || 0) + n;
                }
                return {
                    id: e.id,
                    dateStart: e.dateStart,
                    location: (e.location && e.location.name) ? e.location.name : 'Ukjend lokale',
                    destCoords: dCoords,
                    schools: skuler,
                    elevtalPerSkule,
                    erFortidig: dato < now
                };
            });

        const totalt = turneHendingar.length;
        const medSkular = turneHendingar.filter(h => !h.erFortidig && h.schools.length > 0).length;
        const utenSkular = turneHendingar.filter(h => !h.erFortidig && h.schools.length === 0).length;
        turneStatusEl.textContent = `Fann ${totalt} arrangement (${medSkular} framtidige med skular, ${utenSkular} utan skular). Søker transport...`;

        await sokTransportForAlleTurneHendingar();

    } catch (err) {
        turneStatusEl.textContent = `Feil: ${err.message}`;
        console.error(err);
    }
}

async function sokTransportForAlleTurneHendingar() {
    const turneStatusEl = document.getElementById('turneStatus');
    const maksGange = parseInt(document.getElementById('turneMaksGange').value) || 2000;
    turneResultat = [];

    for (let hi = 0; hi < turneHendingar.length; hi++) {
        const hending = turneHendingar[hi];
        const hendingResultat = { hending: hending, skuleResultat: [] };
        turneResultat.push(hendingResultat);

        // Arrangement utan skular — vis men hopp over søk
        if (hending.schools.length === 0) {
            visTurneResultat();
            document.getElementById('turneResultatSeksjon').style.display = '';
            continue;
        }

        // Fortidige arrangement — ikkje søk Entur (returnerer ingenting)
        if (hending.erFortidig) {
            for (const skule of hending.schools) {
                hendingResultat.skuleResultat.push({
                    skuleId: skule.id, skule: skule.name,
                    elevtal: (hending.elevtalPerSkule || {})[skule.id] || null,
                    alternativ: [{ type: 'bestillerbuss' }],
                    valt: 'bestillerbuss', erFortidig: true
                });
            }
            visTurneResultat();
            document.getElementById('turneResultatSeksjon').style.display = '';
            continue;
        }

        let dCoords = hending.destCoords;
        if (!dCoords) {
            turneStatusEl.textContent = `Geocodar lokale: ${hending.location}...`;
            dCoords = await geocodeAddress(hending.location);
            if (!dCoords) {
                turneStatusEl.textContent = `Fann ikkje koordinatar for ${hending.location}`;
                visTurneResultat();
                document.getElementById('turneResultatSeksjon').style.display = '';
                continue;
            }
        }

        const arriveBy = turneParseDate(hending.dateStart).toISOString();

        for (let si = 0; si < hending.schools.length; si++) {
            const skule = hending.schools[si];
            turneStatusEl.textContent = `Arr. ${hi + 1}/${turneHendingar.length}: ${skule.name} (${si + 1}/${hending.schools.length})...`;

            let sCoords = skuleKoordinatar[skule.name];
            if (!sCoords) {
                sCoords = await geocodeAddress(skule.name + ', Asker');
            }
            if (!sCoords) {
                hendingResultat.skuleResultat.push({
                    skuleId: skule.id, skule: skule.name,
                    elevtal: (hending.elevtalPerSkule || {})[skule.id] || null,
                    alternativ: [{ type: 'bestillerbuss' }],
                    valt: 'bestillerbuss', feil: 'Koordinatar ikkje funne'
                });
                continue;
            }

            const [bussReiser, togReiser, googleGange, googleKøyring] = await Promise.all([
                finnReise(sCoords, dCoords, arriveBy, 'bus'),
                finnReise(sCoords, dCoords, arriveBy, 'rail'),
                hentGoogleAvstand(sCoords, dCoords, 'WALKING'),
                hentGoogleAvstand(sCoords, dCoords, 'DRIVING')
            ]);

            const sr = analysertransportTurne(skule, bussReiser, togReiser, googleGange, googleKøyring, maksGange);
            sr.elevtal = (hending.elevtalPerSkule || {})[skule.id] || null;
            hendingResultat.skuleResultat.push(sr);
        }

        visTurneResultat();
        document.getElementById('turneResultatSeksjon').style.display = '';
    }

    turneStatusEl.textContent = `Ferdig! ${turneHendingar.length} arrangement behandla.`;
}

function analysertransportTurne(skule, bussReiser, togReiser, googleGange, googleKøyring, maksGange) {
    const alternativ = [];

    // Gange — Google WALKING (med haversine-fallback)
    if (googleGange && googleGange.avstand <= maksGange) {
        alternativ.push({
            type: 'gange',
            avstand: googleGange.avstand,
            tid: googleGange.tid,
            avstandTekst: googleGange.avstandTekst || `${(googleGange.avstand/1000).toFixed(1)} km`,
            tidTekst: googleGange.tidTekst || `${googleGange.tid} min`
        });
    }

    // Direktetog — reiseveg-detaljar, ingen hover (tog har fast rutetabell)
    if (togReiser && togReiser.length > 0) {
        const direkteTog = togReiser.filter(t => telKollektivLegs(t.legs) === 1);
        if (direkteTog.length > 0) {
            const togReise = direkteTog[0];
            const togLegs = togReise.legs.filter(l => l.mode === 'rail');
            alternativ.push({
                type: 'tog',
                linje: togLegs.map(l => l.line && l.line.publicCode).filter(Boolean).join(' → '),
                avgang: togReise.startTime,
                ankomst: togReise.endTime,
                varigheit: Math.round(togReise.duration / 60),
                reiseveg: byggReiseveg(togReise.legs)
            });
        }
    }

    // Direktebuss — reiseveg + hover med ekstra avgangar
    if (bussReiser && bussReiser.length > 0) {
        const sorterteBussar = [...bussReiser].sort((a, b) => {
            const la = telKollektivLegs(a.legs);
            const lb = telKollektivLegs(b.legs);
            if (la !== lb) return la - lb;
            return a.duration - b.duration;
        });
        const direkteBussar = sorterteBussar.filter(b => telKollektivLegs(b.legs) === 1);
        if (direkteBussar.length > 0) {
            const bussReise = direkteBussar[0];
            const bussLegs = bussReise.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
            const ekstraAvgangar = direkteBussar.slice(1, 5).map(b => {
                const legs = b.legs.filter(l => l.mode === 'bus' || l.mode === 'coach');
                return {
                    avgang: b.startTime, ankomst: b.endTime,
                    varigheit: Math.round(b.duration / 60),
                    linje: legs.map(l => l.line && l.line.publicCode).filter(Boolean).join(' → ')
                };
            });
            alternativ.push({
                type: 'buss',
                linje: bussLegs.map(l => l.line && l.line.publicCode).filter(Boolean).join(' → '),
                avgang: bussReise.startTime,
                ankomst: bussReise.endTime,
                varigheit: Math.round(bussReise.duration / 60),
                reiseveg: byggReiseveg(bussReise.legs),
                ekstraAvgangar
            });
        }
    }

    // Bestillerbuss med køyretid frå Google DRIVING
    alternativ.push({
        type: 'bestillerbuss',
        avstand: googleKøyring ? googleKøyring.avstand : null,
        tid: googleKøyring ? googleKøyring.tid : null,
        avstandTekst: googleKøyring ? (googleKøyring.avstandTekst || `${(googleKøyring.avstand/1000).toFixed(0)} km`) : null,
        tidTekst: googleKøyring ? (googleKøyring.tidTekst || `${googleKøyring.tid} min`) : null
    });

    // Auto-vel beste etter prioritet: gange > tog > buss > bestillerbuss
    const valt = alternativ[0].type;

    return { skuleId: skule.id, skule: skule.name, alternativ, valt };
}

function visTurneResultat() {
    const liste = document.getElementById('turneResultatListe');
    liste.innerHTML = '';

    for (const hr of turneResultat) {
        const hending = hr.hending;
        const dato = turneParseDate(hending.dateStart);
        const datoStr = dato.toLocaleDateString('nb-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const tidStr = dato.toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });

        const gruppe = document.createElement('div');
        gruppe.className = 'turne-resultat-gruppe';

        const fortidKlasse = hending.erFortidig ? ' turne-fortid-header' : '';
        const fortidLabel = hending.erFortidig ? ' <span style="font-size:11px;background:rgba(255,255,255,0.25);padding:2px 6px;border-radius:3px;margin-left:8px;">Fortid</span>' : '';
        let html = `<div class="turne-resultat-gruppe-header${fortidKlasse}">${datoStr} kl. ${tidStr} — ${hending.location}${fortidLabel}</div>`;

        if (hending.schools.length === 0) {
            html += `<div class="turne-ingen-skular">Ingen skular tildelt endå</div>`;
        }

        for (const sr of hr.skuleResultat) {
            const overstyringKey = `${hending.id}_${sr.skuleId}`;
            const valtType = turneOverstyring[overstyringKey] || sr.valt;
            const valtAlt = (sr.alternativ || []).find(a => a.type === valtType);
            const fortidTekst = sr.erFortidig ? ' <span style="font-size:11px;color:#aaa">(fortid)</span>' : '';

            // Detaljar for valt alternativ
            let detaljar = '';
            if (valtAlt) {
                if (valtAlt.type === 'gange') {
                    detaljar = `${valtAlt.avstandTekst}, ${valtAlt.tidTekst}`;
                } else if (valtAlt.type === 'tog' || valtAlt.type === 'buss') {
                    detaljar = (valtAlt.reiseveg && valtAlt.reiseveg.length > 0)
                        ? valtAlt.reiseveg.join(' → ')
                        : `avgang ${turneFormatTid(valtAlt.avgang)} → ${turneFormatTid(valtAlt.ankomst)} (${valtAlt.varigheit} min)`;
                } else if (valtAlt.type === 'bestillerbuss' && valtAlt.tid) {
                    detaljar = `${valtAlt.avstandTekst || ''}, ca. ${valtAlt.tidTekst || valtAlt.tid + ' min'}`.replace(/^, /, '');
                }
            }
            if (sr.feil) detaljar = `⚠️ ${sr.feil}`;

            // Knappar med hover-dropdown for tog/buss
            let knappar = '';
            for (const alt of (sr.alternativ || [])) {
                const erValt = alt.type === valtType;
                let label = '';
                if (alt.type === 'gange') label = `🚶 Gange`;
                else if (alt.type === 'tog') label = `🚂 Tog ${alt.linje || '?'}`;
                else if (alt.type === 'buss') label = `🚌 Buss ${alt.linje || '?'}`;
                else label = `🚐 Bestillerbuss`;

                const knappHtml = `<button onclick="settTurneOverstyring('${overstyringKey}', '${alt.type}')" class="${erValt ? 'aktiv-overstyring' : ''}">${label}</button>`;

                const hasExtra = alt.type === 'buss' && alt.ekstraAvgangar && alt.ekstraAvgangar.length > 0;
                if (hasExtra) {
                    let dropRows = `<div class="turne-dropdown-rad aktiv-dropdown">avgang ${turneFormatTid(alt.avgang)} → ${turneFormatTid(alt.ankomst)} (${alt.varigheit} min)</div>`;
                    for (const ekstra of alt.ekstraAvgangar) {
                        dropRows += `<div class="turne-dropdown-rad">avgang ${turneFormatTid(ekstra.avgang)} → ${turneFormatTid(ekstra.ankomst)} (${ekstra.varigheit} min)</div>`;
                    }
                    knappar += `<div class="turne-alt-wrapper">${knappHtml}<div class="turne-extra-dropdown">${dropRows}</div></div>`;
                } else {
                    knappar += knappHtml;
                }
            }

            const elevtalHtml = sr.elevtal ? ` <span style="font-size:12px;color:#888;font-weight:normal;">(${sr.elevtal} elever)</span>` : '';
            html += `
                <div class="turne-skule-rad">
                    <span class="turne-skule-namn">${sr.skule}${elevtalHtml}${fortidTekst}</span>
                    <span class="turne-detaljar">${detaljar}</span>
                    <div class="turne-alternativ-knappar">${knappar}</div>
                </div>`;
        }

        gruppe.innerHTML = html;
        liste.appendChild(gruppe);
    }
}

function turneFormatTid(isoStr) {
    if (!isoStr) return '?';
    try { return isoStr.substring(11, 16); } catch(e) { return '?'; }
}

// Konverter dateStart (Unix-sekund eller ISO-streng) til Date-objekt
function turneParseDate(dateStart) {
    if (typeof dateStart === 'number') return new Date(dateStart * 1000);
    return new Date(dateStart);
}

function settTurneOverstyring(key, type) {
    if (turneOverstyring[key] === type) {
        delete turneOverstyring[key]; // Klikk same knapp igjen → revert til auto
    } else {
        turneOverstyring[key] = type;
    }
    visTurneResultat();
}

function genererTurnePayload() {
    const tourId = document.getElementById('turneId').value.trim();

    const payload = {
        tourId: parseInt(tourId),
        generert: new Date().toISOString(),
        events: turneResultat
            .filter(hr => !hr.hending.erFortidig && hr.skuleResultat.length > 0)
            .map(hr => {
                const hending = hr.hending;
                const dato = turneParseDate(hending.dateStart);
                return {
                    eventId: hending.id,
                    dateStart: dato.toISOString(),
                    location: hending.location,
                    schools: hr.skuleResultat.map(sr => {
                        const overstyringKey = `${hending.id}_${sr.skuleId}`;
                        const valtType = turneOverstyring[overstyringKey] || sr.valt;
                        const valtAlt = (sr.alternativ || []).find(a => a.type === valtType) || { type: 'bestillerbuss' };
                        return {
                            schoolId: sr.skuleId,
                            name: sr.skule,
                            transport: valtAlt.type,
                            linje: (valtAlt.type === 'buss' || valtAlt.type === 'tog') ? (valtAlt.linje || null) : null,
                            departureTime: (valtAlt.type === 'buss' || valtAlt.type === 'tog') ? turneFormatTid(valtAlt.avgang) : null
                        };
                    })
                };
            })
    };

    const payloadStr = JSON.stringify(payload, null, 2);
    const ta = document.getElementById('turnePayload');
    ta.value = payloadStr;
    ta.style.display = '';
    ta.select();
}
